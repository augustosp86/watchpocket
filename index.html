<!DOCTYPE html>
<html lang="es">
<head>

<title>Cuentas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f0e8;--card:#fff;--border:#e8e0d0;--text:#1e1a16;--muted:#8a7d6e;--accent:#c17f3a;--accent2:#e8a44a;--abg:#fef6ea;--green:#3d9a6a;--red:#c53030;--amber:#c47a1a;--teal:#2a8a8a;--inp:#f0ebe0;--sh:0 2px 12px rgba(0,0,0,.07)}
.dk{--bg:#161311;--card:#1e1b18;--border:#2d2820;--text:#f0ebe0;--muted:#7a6e62;--inp:#252017;--abg:rgba(193,127,58,.12)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
main{max-width:480px;margin:0 auto;padding:14px 14px 110px}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:0 1px 12px rgba(0,0,0,.06)}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent)}
.logo small{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-top:-3px}
.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 15px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--muted);margin-bottom:-1px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.inp{background:var(--inp);border:1.5px solid transparent;border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.sel{background:var(--inp);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:13px;color:var(--text);font-family:inherit;width:100%;outline:none}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.btn-s{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;width:100%}
.btn-del{background:var(--red);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.sm{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.sm.gr{background:var(--green)}
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:block}
.flbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
.modal-bg{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding-bottom:32px;animation:up .22s ease}
@keyframes up{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.mhan{width:40px;height:4px;background:var(--border);border-radius:4px;margin:14px auto 0}
.mhed{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 16px;border-bottom:1px solid var(--border)}
.mhed h3{font-size:16px;font-weight:600}
.mhed button{background:var(--inp);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:17px;display:flex;align-items:center;justify-content:center}
.mbody{padding:16px 20px 0;display:flex;flex-direction:column;gap:14px}
.seg{display:flex;gap:7px;flex-wrap:wrap}
.sbtn{padding:8px 11px;border-radius:11px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;white-space:nowrap}
.arow{display:flex;align-items:center;padding:10px 13px;background:var(--inp);border-radius:13px;margin-bottom:7px;gap:9px}
.upitem{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--inp);border-radius:13px;margin-bottom:8px}
.upitem.urg{background:rgba(197,48,48,.07);border:1px solid rgba(197,48,48,.18)}
.pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.txrow{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sbox{background:var(--inp);border-radius:14px;padding:13px;margin-top:4px}
.ibox{padding:11px 13px;background:var(--inp);border-radius:12px;font-size:12px;color:var(--muted);line-height:1.65}
.ibox.warn{background:rgba(197,48,48,.07);border:1px solid rgba(197,48,48,.2);color:var(--red)}
.prog{height:6px;border-radius:4px;background:var(--inp);overflow:hidden}
.fab-wrap{position:fixed;bottom:26px;right:20px;display:flex;flex-direction:column;gap:11px;align-items:flex-end;z-index:50}
.fab{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:50%;width:58px;height:58px;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(193,127,58,.45);display:flex;align-items:center;justify-content:center}
.fab-sm{background:var(--card);border:1.5px solid var(--border);color:var(--muted);border-radius:50%;width:44px;height:44px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.hbtn{background:var(--inp);border:none;border-radius:9px;padding:6px 11px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit}
.qbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1}
.sdiv{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:16px 0 9px;display:flex;align-items:center;gap:8px}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.sc{text-align:center;padding:11px 8px;border-radius:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{display:flex;flex-direction:column;align-items:center}
.cal-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px}
.cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.tog{width:44px;height:25px;border-radius:13px;position:relative;cursor:pointer;border:none;flex-shrink:0;display:inline-block}
.tok{position:absolute;top:3px;width:19px;height:19px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 5px rgba(0,0,0,.22)}
input[type=range]{accent-color:var(--accent);width:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────
const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
const td=()=>new Date().toISOString().slice(0,10);
const ym=(y,m)=>y+'-'+String(m+1).padStart(2,'0');
const ymOf=s=>s?s.slice(0,7):'';
const addMo=(s,n)=>{const y=parseInt(s.slice(0,4)),m=parseInt(s.slice(5,7))-1,d=new Date(y,m+n,1);return ym(d.getFullYear(),d.getMonth());};
const thisYM=ym(cy,cm),nextYM=addMo(thisYM,1);
const fmt=n=>'$'+Number(n||0).toLocaleString('es-AR',{maximumFractionDigits:0});
const D=(day,mo,yr)=>new Date(yr||cy,mo!=null?mo:cm,day).toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const CATS=['Alimentación','Transporte','Servicios','Entretenimiento','Salud','Ropa','Educación','Viajes','Hogar','Otros'];
const ICATS=['Sueldo','Honorarios','Rendimientos','Dividendos','Alquiler cobrado','Transferencia recibida','Otros ingresos'];
const MOS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MSH=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DYS=['D','L','M','X','J','V','S'];
const CC=['#e8956d','#7fb5ae','#c084fc','#60a5fa','#f87171','#a78bfa','#4ade80','#fbbf24','#38bdf8','#94a3b8'];
const ATYPES=[
  {v:'cash',l:'💵 Efectivo',liq:true},
  {v:'debit',l:'🏦 Débito / CA',liq:true},
  {v:'savliq',l:'💰 Cta. remunerada',liq:true},
  {v:'invliq',l:'📈 Fondo (disponible)',liq:true},
  {v:'sav',l:'🎯 Ahorro / Reserva',liq:false},
  {v:'inv',l:'📊 Fondo / Inversión',liq:false},
  {v:'credit',l:'💳 Tarjeta de crédito',liq:false},
];
const AICO={cash:'💵',debit:'🏦',savliq:'💰',invliq:'📈',sav:'🎯',inv:'📊',credit:'💳'};
const isLiq=t=>['cash','debit','savliq','invliq'].includes(t);
const isSav=t=>['sav','inv','savliq','invliq'].includes(t);

// ── CARD LOGIC ────────────────────────────────────────────────────
function firstYM(cd,cardId,cdates){
  const dt=new Date(cd+'T12:00:00');
  const cym=ym(dt.getFullYear(),dt.getMonth());
  const cl=cdates[cardId+'::'+cym]?.closing;
  if(!cl)return addMo(cym,1);
  return dt<=new Date(cl+'T12:00:00')?cym:addMo(cym,1);
}
function genCharges(exp,cdates){
  const n=exp.installments||1,pq=Math.round(exp.amount/n),f1=firstYM(exp.consumptionDate,exp.accountId,cdates);
  return Array.from({length:n},(_,i)=>({id:exp.id+'::c'+(i+1),expenseId:exp.id,description:exp.description,category:exp.category,amount:pq,yearMonth:addMo(f1,i),idx:i+1,total:n,accountId:exp.accountId}));
}
function getStmt(cardId,ymStr,charges){
  const ch=charges.filter(c=>c.accountId===cardId&&c.yearMonth===ymStr);
  return{charges:ch,total:ch.reduce((s,c)=>s+c.amount,0)};
}

// ── STATE ─────────────────────────────────────────────────────────
let S={
  dark:false,tab:0,calOpen:false,
  accounts:[
    {id:'a1',name:'Efectivo',type:'cash',balance:15000},
    {id:'a2',name:'Galicia CA',type:'debit',balance:82500},
    {id:'a3',name:'Brubank',type:'debit',balance:43200},
    {id:'a4',name:'Visa Galicia',type:'credit',balance:0},
    {id:'a5',name:'Mastercard',type:'credit',balance:0},
    {id:'a6',name:'Fondo IOL',type:'invliq',balance:120000},
    {id:'a7',name:'Reserva vacaciones',type:'sav',balance:50000},
    {id:'a8',name:'Fondo ahorro',type:'inv',balance:80000},
  ],
  cashTxs:[
    {id:'t1',type:'cf',description:'Sueldo',amount:350000,category:'Sueldo',consumDate:D(1),payDate:D(1),accountId:'a2',isIncome:true,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t2',type:'cf',description:'Supermercado',amount:24000,category:'Alimentación',consumDate:D(10),payDate:D(10),accountId:'a2',isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t3',type:'cf',description:'Farmacia',amount:8500,category:'Salud',consumDate:D(8),payDate:D(8),accountId:'a1',isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t4',type:'cf',description:'Uber',amount:6800,category:'Transporte',consumDate:D(12),payDate:D(12),accountId:'a1',isIncome:false,shared:true,myPct:50,deductMode:'full',sharedWith:'Marcos',debtPaid:false},
  ],
  creditExps:[
    {id:'c1',type:'cr',description:'Notebook',amount:360000,category:'Educación',consumptionDate:D(15),accountId:'a4',installments:12,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'c2',type:'cr',description:'Netflix',amount:5200,category:'Entretenimiento',consumptionDate:D(8),accountId:'a4',installments:1,shared:true,myPct:33,deductMode:'mine',sharedWith:'Ana y Pedro',debtPaid:false},
    {id:'c3',type:'cr',description:'Bicicleta',amount:120000,category:'Transporte',consumptionDate:D(22),accountId:'a5',installments:6,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
  ],
  dues:[
    {id:'d1',name:'Expensas',amount:85000,dueDate:D(now.getDate()+3),recurring:true,status:'pending'},
    {id:'d2',name:'Luz',amount:12400,dueDate:D(now.getDate()+7),recurring:false,status:'pending'},
    {id:'d3',name:'Internet',amount:6800,dueDate:D(5,cm+1),recurring:true,status:'pending'},
    {id:'d4',name:'Alquiler',amount:180000,dueDate:D(1,cm+1),recurring:true,status:'pending'},
  ],
  cardDates:{},
  stmtPays:[],
  modal:null,calMo:cm,calYr:cy,
  search:'',fMonth:thisYM,fAcc:'all',
  showAllUp:false,showNextDetail:false,selCard:'a4',
  histView:'mes',histMonth:thisYM,histYear:String(cy),
};
S.cardDates['a4::'+thisYM]={closing:D(20),due:D(10,cm+1)};
S.cardDates['a5::'+thisYM]={closing:D(18),due:D(8,cm+1)};

// ── DEMO DATA: meses anteriores ───────────────────────────────────
(function(){
  const prev=(n)=>{const d=new Date(cy,cm-n,1);return{y:d.getFullYear(),m:d.getMonth()}};
  const dPrev=(day,nMo)=>{const p=prev(nMo);return new Date(p.y,p.m,day).toISOString().slice(0,10);};
  const addTx=(id,desc,amount,cat,consumDate,payDate,accId,isIncome,shared,myPct,deductMode,sharedWith)=>{
    S.cashTxs.push({id,type:'cf',description:desc,amount,category:cat,consumDate,payDate,accountId:accId,isIncome,shared,myPct,deductMode:deductMode||'mine',sharedWith:sharedWith||'',debtPaid:false});
  };
  // Marzo (1 mes atrás)
  addTx('h-m1-1','Sueldo',350000,'Sueldo',dPrev(1,1),dPrev(1,1),'a2',true,false,100);
  addTx('h-m1-2','Supermercado',32000,'Alimentación',dPrev(5,1),dPrev(5,1),'a2',false,false,100);
  addTx('h-m1-3','Nafta',15000,'Transporte',dPrev(8,1),dPrev(8,1),'a1',false,false,100);
  addTx('h-m1-4','Farmacia',6200,'Salud',dPrev(12,1),dPrev(12,1),'a1',false,false,100);
  addTx('h-m1-5','Netflix compartido',5200,'Entretenimiento',dPrev(10,1),dPrev(10,1),'a2',false,true,33,'mine','Ana y Pedro');
  addTx('h-m1-6','Alquiler',180000,'Hogar',dPrev(1,1),dPrev(1,1),'a2',false,false,100);
  addTx('h-m1-7','Ropa',28000,'Ropa',dPrev(20,1),dPrev(20,1),'a2',false,false,100);
  addTx('h-m1-8','Rendimiento IOL',4800,'Rendimientos',dPrev(15,1),dPrev(15,1),'a6',true,false,100);
  // Febrero (2 meses atrás)
  addTx('h-m2-1','Sueldo',350000,'Sueldo',dPrev(1,2),dPrev(1,2),'a2',true,false,100);
  addTx('h-m2-2','Supermercado',28500,'Alimentación',dPrev(6,2),dPrev(6,2),'a2',false,false,100);
  addTx('h-m2-3','Transporte',9000,'Transporte',dPrev(9,2),dPrev(9,2),'a1',false,false,100);
  addTx('h-m2-4','Médico',12000,'Salud',dPrev(14,2),dPrev(14,2),'a2',false,false,100);
  addTx('h-m2-5','Alquiler',180000,'Hogar',dPrev(1,2),dPrev(1,2),'a2',false,false,100);
  addTx('h-m2-6','Internet',6800,'Servicios',dPrev(5,2),dPrev(5,2),'a2',false,false,100);
  addTx('h-m2-7','Cena restaurante',18000,'Entretenimiento',dPrev(22,2),dPrev(22,2),'a1',false,false,100);
  addTx('h-m2-8','Honorarios extra',50000,'Honorarios',dPrev(20,2),dPrev(20,2),'a2',true,false,100);
  addTx('h-m2-9','Rendimiento IOL',4200,'Rendimientos',dPrev(15,2),dPrev(15,2),'a6',true,false,100);
  // Enero (3 meses atrás)
  addTx('h-m3-1','Sueldo',320000,'Sueldo',dPrev(1,3),dPrev(1,3),'a2',true,false,100);
  addTx('h-m3-2','Supermercado',25000,'Alimentación',dPrev(7,3),dPrev(7,3),'a2',false,false,100);
  addTx('h-m3-3','Vacaciones viáticos',45000,'Viajes',dPrev(10,3),dPrev(10,3),'a1',false,false,100);
  addTx('h-m3-4','Alquiler',170000,'Hogar',dPrev(1,3),dPrev(1,3),'a2',false,false,100);
  addTx('h-m3-5','Educación curso',22000,'Educación',dPrev(15,3),dPrev(15,3),'a2',false,false,100);
  addTx('h-m3-6','Servicios',8500,'Servicios',dPrev(8,3),dPrev(8,3),'a2',false,false,100);
  addTx('h-m3-7','Rendimiento IOL',3900,'Rendimientos',dPrev(15,3),dPrev(15,3),'a6',true,false,100);
})();
let MF={};

// ── COMPUTED ──────────────────────────────────────────────────────
function comp(){
  const allCharges=S.creditExps.flatMap(e=>genCharges(e,S.cardDates));
  const cards=S.accounts.filter(a=>a.type==='credit');
  const liqAccts=S.accounts.filter(a=>isLiq(a.type));
  const savAccts=S.accounts.filter(a=>isSav(a.type));
  const nonCredit=S.accounts.filter(a=>a.type!=='credit');
  const totalLiq=liqAccts.reduce((s,a)=>s+a.balance,0);
  const committed=cards.reduce((sum,card)=>{
    const relYMs=[...new Set(Object.entries(S.cardDates)
      .filter(([k,v])=>k.startsWith(card.id+'::')&&ymOf(v.due)===thisYM)
      .map(([k])=>k.split('::')[1]))];
    return sum+relYMs.reduce((s,ym2)=>{
      if(S.stmtPays.some(sp=>sp.cardId===card.id&&sp.yearMonth===ym2))return s;
      return s+getStmt(card.id,ym2,allCharges).total;
    },0);
  },0);
  const duesAmt=S.dues.filter(d=>ymOf(d.dueDate)===thisYM&&d.status==='pending').reduce((s,d)=>s+d.amount,0);
  const netAvail=totalLiq-committed-duesAmt;
  const thisCash=S.cashTxs.filter(tx=>ymOf(tx.payDate)===thisYM);
  const thisInc=thisCash.filter(tx=>tx.isIncome).reduce((s,tx)=>s+tx.amount,0);
  const thisExp=thisCash.filter(tx=>!tx.isIncome).reduce((s,tx)=>s+(tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount),0);
  const debts=[...S.cashTxs,...S.creditExps].filter(tx=>tx.shared&&!tx.isIncome&&!tx.debtPaid);
  const tod=new Date(),fut=new Date();fut.setDate(fut.getDate()+45);
  const past=new Date();past.setDate(past.getDate()-30);
  const upcoming=[];
  S.dues.filter(d=>d.status==='pending').forEach(d=>{
    const dt=new Date(d.dueDate+'T12:00:00');
    if(dt>=past&&dt<=fut)upcoming.push({type:'due',id:d.id,name:d.name,amount:d.amount,date:d.dueDate,raw:d,over:dt<tod});
  });
  cards.forEach(card=>{
    [thisYM,nextYM].forEach(y2=>{
      const dates=S.cardDates[card.id+'::'+y2];
      if(dates&&dates.due){
        const dt=new Date(dates.due+'T12:00:00');
        const stmt=getStmt(card.id,y2,allCharges);
        const paid=S.stmtPays.some(sp=>sp.cardId===card.id&&sp.yearMonth===y2);
        if(!paid&&dt>=past&&dt<=fut&&stmt.total>0)
          upcoming.push({type:'card',id:'c::'+card.id+'::'+y2,name:card.name,amount:stmt.total,date:dates.due,cardId:card.id,ymStr:y2,over:dt<tod});
      }
    });
  });
  upcoming.sort((a,b)=>a.date.localeCompare(b.date));
  const cardTots=cards.map(c=>({name:c.name,total:getStmt(c.id,nextYM,allCharges).total,cardId:c.id})).filter(c=>c.total>0);
  const nextDues=S.dues.filter(d=>ymOf(d.dueDate)===nextYM&&d.status==='pending');
  const nextTotal=cardTots.reduce((s,c)=>s+c.total,0)+nextDues.reduce((s,d)=>s+d.amount,0);
  // History
  const moMap={};
  S.cashTxs.forEach(tx=>{
    const mk=ymOf(tx.payDate);
    if(!moMap[mk])moMap[mk]={month:mk,income:0,expense:0,txs:[]};
    if(tx.isIncome)moMap[mk].income+=tx.amount;
    else moMap[mk].expense+=tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount;
    moMap[mk].txs.push(tx);
  });
  const hist=Object.values(moMap).sort((a,b)=>b.month.localeCompare(a.month))
    .map(d=>({...d,income:Math.round(d.income),expense:Math.round(d.expense),net:Math.round(d.income-d.expense)}));
  const yrMap={};
  hist.forEach(h=>{
    const yr=h.month.slice(0,4);
    if(!yrMap[yr])yrMap[yr]={year:yr,income:0,expense:0};
    yrMap[yr].income+=h.income;yrMap[yr].expense+=h.expense;
  });
  const yrHist=Object.values(yrMap).sort((a,b)=>b.year.localeCompare(a.year))
    .map(d=>({...d,net:Math.round(d.income-d.expense)}));
  const years=[...new Set(hist.map(h=>h.month.slice(0,4)))].sort((a,b)=>b.localeCompare(a));
  const months=[];
  for(let i=-12;i<=2;i++){const d2=new Date(cy,cm+i,1);months.push(ym(d2.getFullYear(),d2.getMonth()));}
  const filtTxs=[...S.cashTxs,...S.creditExps].filter(tx=>{
    const pd=tx.payDate||tx.consumptionDate||tx.consumDate;
    const ch=tx.type==='cr'?genCharges(tx,S.cardDates):[];
    const mM=S.fMonth==='all'||(tx.type==='cr'?ch.some(c=>c.yearMonth===S.fMonth):ymOf(pd)===S.fMonth);
    return mM&&(S.fAcc==='all'||tx.accountId===S.fAcc)&&(!S.search||tx.description.toLowerCase().includes(S.search.toLowerCase()));
  }).sort((a,b)=>{
    const da=a.payDate||a.consumptionDate||a.consumDate,db=b.payDate||b.consumptionDate||b.consumDate;
    return db.localeCompare(da);
  });
  return{allCharges,cards,liqAccts,savAccts,nonCredit,totalLiq,committed,duesAmt,netAvail,thisInc,thisExp,debts,upcoming,cardTots,nextDues,nextTotal,hist,yrHist,years,months,filtTxs};
}

// ── DISPATCH ──────────────────────────────────────────────────────
function dispatch(action,payload){
  const applyBal=(accs,id,delta)=>accs.map(a=>a.id===id?{...a,balance:Math.round((a.balance+delta)*100)/100}:a);
  const txImpact=tx=>tx.isIncome?tx.amount:-(tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount);

  switch(action){
    case 'DARK': S.dark=!S.dark; break;
    case 'TAB': S.tab=payload; break;
    case 'MODAL': S.modal=payload; MF={}; break;
    case 'CAL_P':{const d=new Date(S.calYr,S.calMo-1,1);S.calMo=d.getMonth();S.calYr=d.getFullYear();break;}
    case 'CAL_N':{const d=new Date(S.calYr,S.calMo+1,1);S.calMo=d.getMonth();S.calYr=d.getFullYear();break;}
    case 'CAL_TOG': S.calOpen=!S.calOpen; break;
    case 'TOG_UP': S.showAllUp=!S.showAllUp; break;
    case 'TOG_NX': S.showNextDetail=!S.showNextDetail; break;
    case 'SEARCH': S.search=payload; break;
    case 'FMONTH': S.fMonth=payload; break;
    case 'FACC': S.fAcc=payload; break;
    case 'SELCARD': S.selCard=payload; break;
    case 'HVIEW': S.histView=payload; break;
    case 'HMONTH': S.histMonth=payload; break;
    case 'HYEAR': S.histYear=payload; break;
    case 'SAVE_CASH':{
      const d=payload;
      if(d.editId){
        const old=S.cashTxs.find(t=>t.id===d.editId);
        S.accounts=applyBal(applyBal(S.accounts,old.accountId,-txImpact(old)),d.accountId,txImpact(d));
        S.cashTxs=S.cashTxs.map(t=>t.id===d.editId?{...d,id:d.editId}:t);
      }else{
        S.accounts=applyBal(S.accounts,d.accountId,txImpact(d));
        S.cashTxs=[...S.cashTxs,{...d,id:'tx-'+Date.now()}];
      }
      S.modal=null; break;
    }
    case 'QUICK':{
      const{accId,amount,isIncome,category,description}=payload;
      S.accounts=applyBal(S.accounts,accId,isIncome?amount:-amount);
      S.cashTxs=[...S.cashTxs,{id:'tx-'+Date.now(),type:'cf',description,amount,category,consumDate:td(),payDate:td(),accountId:accId,isIncome,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
      S.modal=null; break;
    }
    case 'TRANSFER':{
      const{fromId,toId,amount}=payload;
      S.accounts=applyBal(applyBal(S.accounts,fromId,-amount),toId,amount);
      S.modal=null; break;
    }
    case 'SAVE_CR':{
      const d=payload;
      if(d.editId)S.creditExps=S.creditExps.map(e=>e.id===d.editId?{...d,id:d.editId}:e);
      else S.creditExps=[...S.creditExps,{...d,id:'cr-'+Date.now()}];
      S.modal=null; break;
    }
    case 'DEL_CASH':{
      S.accounts=applyBal(S.accounts,payload.accountId,-txImpact(payload));
      S.cashTxs=S.cashTxs.filter(t=>t.id!==payload.id);
      S.modal=null; break;
    }
    case 'DEL_CR':{
      S.creditExps=S.creditExps.filter(e=>e.id!==payload.id);
      S.modal=null; break;
    }
    case 'DEL_ACC':{
      const id=payload;
      const acc=S.accounts.find(a=>a.id===id);
      S.accounts=S.accounts.filter(a=>a.id!==id);
      S.cashTxs=S.cashTxs.filter(t=>t.accountId!==id);
      S.creditExps=S.creditExps.filter(e=>e.accountId!==id);
      S.stmtPays=S.stmtPays.filter(sp=>sp.fromId!==id&&sp.cardId!==id);
      if(acc&&acc.type==='credit')Object.keys(S.cardDates).forEach(k=>{if(k.startsWith(id+'::'))delete S.cardDates[k];});
      S.modal=null; break;
    }
    case 'PAY_STMT':{
      const{cardId,ymStr,amount,payDate,fromId}=payload;
      S.accounts=applyBal(S.accounts,fromId,-amount);
      S.stmtPays=[...S.stmtPays,{id:'sp-'+Date.now(),cardId,yearMonth:ymStr,amount,payDate,fromId}];
      S.modal=null; break;
    }
    case 'PAY_DUE':{
      const{due,method,accId,cardId,inst}=payload;
      if(method==='cash'){
        S.accounts=applyBal(S.accounts,accId,-due.amount);
        S.cashTxs=[...S.cashTxs,{id:'tx-'+Date.now(),type:'cf',description:due.name,amount:due.amount,category:'Servicios',consumDate:due.dueDate,payDate:td(),accountId:accId,isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
      }else{
        S.creditExps=[...S.creditExps,{id:'cr-'+Date.now(),type:'cr',description:due.name,amount:due.amount,category:'Servicios',consumptionDate:td(),accountId:cardId,installments:inst||1,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
      }
      S.dues=S.dues.map(d=>d.id===due.id?{...d,status:'paid'}:d);
      S.modal=null; break;
    }
    case 'GOT_PAID':{
      const{tx,amount,method,toId}=payload;
      if(method!=='other'){
        S.accounts=applyBal(S.accounts,toId,amount);
        S.cashTxs=[...S.cashTxs,{id:'pay-'+Date.now(),type:'cf',description:'Cobro: '+tx.description,amount,category:'Otros ingresos',consumDate:td(),payDate:td(),accountId:toId,isIncome:true,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
      }
      if(tx.type==='cf')S.cashTxs=S.cashTxs.map(t=>t.id===tx.id?{...t,debtPaid:true}:t);
      else S.creditExps=S.creditExps.map(e=>e.id===tx.id?{...e,debtPaid:true}:e);
      S.modal=null; break;
    }
    case 'CDATES':{
      const{cardId,ymStr,closing,due}=payload;
      S.cardDates={...S.cardDates};
      S.cardDates[cardId+'::'+ymStr]={closing,due};
      S.modal=null; break;
    }
    case 'ADD_ACC':{
      S.accounts=[...S.accounts,{...payload,id:'a-'+Date.now(),balance:parseFloat(payload.balance||0)}];
      S.modal=null; break;
    }
    case 'SAVE_DUE':{
      S.dues=[...S.dues,{...payload,id:'d-'+Date.now(),status:'pending'}];
      S.modal=null; break;
    }
    case 'EXPORT': doExport(); break;
    case 'IMPORT': doImport(payload); break;
  }
  render();
}

// ── EXPORT ────────────────────────────────────────────────────────
function doExport(){
  const csv=rows=>rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');

  const r1=[['ID','Fecha consumo','Fecha pago','Descripcion','Tipo','Categoria','Monto total','Monto mi parte','Mi%','Compartido','Compartido con','Cuenta','Tipo cuenta','Cuotas','Cuota#','Resumen YM']];
  S.cashTxs.forEach(tx=>{
    const acc=S.accounts.find(a=>a.id===tx.accountId);
    const miParte=tx.deductMode==='mine'?Math.round(tx.amount*tx.myPct/100):tx.amount;
    r1.push([tx.id,tx.consumDate||'',tx.payDate||'',tx.description,tx.isIncome?'Ingreso':'Gasto',tx.category||'',tx.amount,miParte,tx.myPct,tx.shared?'Si':'No',tx.sharedWith||'',acc?acc.name:'',acc?acc.type:'',1,1,'']);
  });
  S.creditExps.forEach(exp=>{
    const acc=S.accounts.find(a=>a.id===exp.accountId);
    genCharges(exp,S.cardDates).forEach(c=>{
      r1.push([exp.id,exp.consumptionDate||'','',exp.description,'Tarjeta',exp.category||'',exp.amount,Math.round(exp.amount*exp.myPct/100),exp.myPct,exp.shared?'Si':'No',exp.sharedWith||'',acc?acc.name:'',acc?acc.type:'',exp.installments,c.idx,c.yearMonth]);
    });
  });

  const moMap={};
  S.cashTxs.forEach(tx=>{
    const mk=ymOf(tx.payDate);
    if(!moMap[mk])moMap[mk]={mes:mk,ingresos:0,gastos:0,txs:0};
    if(tx.isIncome)moMap[mk].ingresos+=tx.amount;
    else moMap[mk].gastos+=tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount;
    moMap[mk].txs++;
  });
  const r2=[['Mes','Ingresos','Gastos','Neto','Movimientos']];
  Object.values(moMap).sort((a,b)=>a.mes.localeCompare(b.mes)).forEach(d=>r2.push([d.mes,Math.round(d.ingresos),Math.round(d.gastos),Math.round(d.ingresos-d.gastos),d.txs]));

  const r3=[['ID','Nombre','Tipo','Saldo','Liquida','Ahorro']];
  S.accounts.forEach(a=>{const opt=ATYPES.find(o=>o.v===a.type);r3.push([a.id,a.name,opt?opt.l:a.type,a.balance,isLiq(a.type)?'Si':'No',isSav(a.type)?'Si':'No']);});

  const r4=[['ID','Nombre','Monto','Fecha','Recurrente','Estado']];
  S.dues.forEach(d=>r4.push([d.id,d.name,d.amount,d.dueDate,d.recurring?'Si':'No',d.status==='paid'?'Pagado':'Pendiente']));

  const content='== MOVIMIENTOS ==\n'+csv(r1)+'\n\n== RESUMEN MENSUAL ==\n'+csv(r2)+'\n\n== CUENTAS ==\n'+csv(r3)+'\n\n== VENCIMIENTOS ==\n'+csv(r4);

  // Show export modal with textarea to copy
  S.modal={type:'exportData',content};
  render();
}

// ── IMPORT ────────────────────────────────────────────────────────
function doImport(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('Archivo vacío');return;}
      const parseRow=line=>{
        const cols=[];let cur='',inQ=false;
        for(let i=0;i<line.length;i++){
          const c=line[i];
          if(c==='"'&&!inQ)inQ=true;
          else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
          else if(c==='"'&&inQ)inQ=false;
          else if(c===','&&!inQ){cols.push(cur);cur='';}
          else cur+=c;
        }
        cols.push(cur);
        return cols.map(c=>c.trim());
      };
      const hdr=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,''));
      const rows=lines.slice(1).map(l=>parseRow(l));
      const get=(row,name)=>{const i=hdr.findIndex(h=>h.includes(name));return i>=0?row[i]||'':''};
      let imp=0,skip=0;const newT=[],newC=[];
      rows.forEach((row,i)=>{
        const id=get(row,'id')||('imp-'+Date.now()+'-'+i);
        const tipo=get(row,'tipo').toLowerCase();
        const desc=get(row,'descripci');const monto=parseFloat(get(row,'monto'))||0;
        const cat=get(row,'categor');
        const cdate=get(row,'consumo')||get(row,'fecha')||td();
        const pdate=get(row,'pago')||cdate;
        const accName=get(row,'cuenta');
        const acc=S.accounts.find(a=>a.name===accName)||S.accounts[0];
        if(!desc||!monto)return;
        if(tipo==='tarjeta'){
          if(!newC.find(x=>x.id===id)){
            const inst=parseInt(get(row,'cuotas'))||1;
            newC.push({id,type:'cr',description:desc,amount:monto*inst,category:cat||CATS[0],consumptionDate:cdate,accountId:acc?acc.id:S.accounts[0].id,installments:inst,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false});
            imp++;
          }
        }else{
          if(!S.cashTxs.find(t=>t.id===id)){
            const isIn=tipo==='ingreso';
            newT.push({id,type:'cf',description:desc,amount:monto,category:cat||(isIn?ICATS[0]:CATS[0]),consumDate:cdate,payDate:pdate,accountId:acc?acc.id:S.accounts[0].id,isIncome:isIn,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false});
            imp++;
          }else skip++;
        }
      });
      if(confirm(imp+' movimientos nuevos'+(skip?' ('+skip+' duplicados)':'')+'.\n¿Agregar?')){
        newT.forEach(tx=>{
          S.accounts=S.accounts.map(a=>a.id===tx.accountId?{...a,balance:Math.round((a.balance+(tx.isIncome?tx.amount:-tx.amount))*100)/100}:a);
          S.cashTxs.push(tx);
        });
        newC.forEach(exp=>S.creditExps.push(exp));
        alert(imp+' movimientos importados.');render();
      }
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsText(file,'utf-8');
}

// ── ANALYSIS ──────────────────────────────────────────────────────
function tabAnalysis(C){
  const view=S.histView;
  const sc=(lbl,val,col,bg)=>'<div class="sc" style="background:'+bg+'"><div style="font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:'+col+';margin-bottom:4px">'+lbl+'</div><div style="font-size:15px;font-weight:700;color:'+col+'">'+val+'</div></div>';
  const ts=(inc,exp,net)=>'<div class="stat3">'+sc('Ingresos','+'+fmt(inc),'var(--green)','rgba(61,154,106,.1)')+sc('Gastos','-'+fmt(exp),'var(--red)','rgba(197,48,48,.08)')+sc('Neto',(net>=0?'+':'')+fmt(net),net>=0?'var(--green)':'var(--red)',net>=0?'rgba(61,154,106,.1)':'rgba(197,48,48,.08)')+'</div>';

  let content='',extraContent='';

  if(view==='mes'){
    const selMo=C.hist.find(h=>h.month===S.histMonth)||C.hist[0];
    const moTxs=S.cashTxs.filter(tx=>ymOf(tx.payDate)===(selMo?selMo.month:S.histMonth));
    const catMap={};
    moTxs.filter(tx=>!tx.isIncome).forEach(tx=>{const a=tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount;catMap[tx.category]=(catMap[tx.category]||0)+a;});
    const cd=Object.entries(catMap).map(([n,v])=>({name:n,value:Math.round(v)})).sort((a,b)=>b.value-a.value);
    const maxCat=cd[0]?cd[0].value:1;
    const incTxs=moTxs.filter(tx=>tx.isIncome);
    const incMap={};incTxs.forEach(tx=>{incMap[tx.category]=(incMap[tx.category]||0)+tx.amount;});
    const incCats=Object.entries(incMap).map(([n,v])=>({name:n,value:Math.round(v)})).sort((a,b)=>b.value-a.value);
    const totalInc=incCats.reduce((s,c)=>s+c.value,0);

    content='<select id="selHM" class="sel" style="margin-bottom:14px">'+C.hist.map(h=>'<option value="'+h.month+'"'+(h.month===S.histMonth?' selected':'')+'>'+ MOS[parseInt(h.month.slice(5,7))-1]+' '+h.month.slice(0,4)+'</option>').join('')+'</select>'
      +(selMo?ts(selMo.income,selMo.expense,selMo.net):'')
      +(cd.length?buildPie(cd):'')
      +(selMo?'<div style="font-size:11px;font-weight:600;color:'+M()+';margin:12px 0 8px;text-transform:uppercase;letter-spacing:.05em">'+selMo.txs.length+' movimientos</div>'+selMo.txs.map(tx=>{const acc=S.accounts.find(a=>a.id===tx.accountId),isIn=tx.isIncome,amt=tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount;return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid '+BD()+'"><div style="min-width:0"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(tx.description)+'</div><div style="font-size:11px;color:'+M()+'">'+( tx.payDate||tx.consumDate)+' · '+esc(acc?acc.name:'')+'</div></div><span style="font-size:13px;font-weight:700;color:'+(isIn?'var(--green)':'var(--red)')+';flex-shrink:0;margin-left:10px">'+(isIn?'+':'-')+fmt(amt)+'</span></div>';}).join(''):'<p style="text-align:center;color:'+M()+';padding:16px 0">Sin movimientos</p>');

    // Extra charts for mes view
    if(cd.length){
      extraContent+='<div class="card"><span class="lbl">Top gastos por categoría</span>'+cd.slice(0,6).map((c,i)=>'<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:'+M()+'">'+esc(c.name)+'</span><span style="font-size:12px;font-weight:600">'+fmt(c.value)+'</span></div><div style="height:7px;border-radius:4px;background:'+IN()+';overflow:hidden"><div style="height:100%;width:'+Math.round(c.value/maxCat*100)+'%;background:'+CC[i%CC.length]+';border-radius:4px"></div></div></div>').join('')+'</div>';
    }
    if(incCats.length){
      extraContent+='<div class="card"><span class="lbl">Origen de ingresos</span>'+incCats.map((c,i)=>{const pct=Math.round(c.value/totalInc*100);return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="width:10px;height:10px;border-radius:3px;background:'+CC[(i+4)%CC.length]+';flex-shrink:0"></div><span style="font-size:12px;color:'+M()+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.name)+'</span><span style="font-size:12px;color:'+M()+'">'+pct+'%</span><span style="font-size:12px;font-weight:600;min-width:70px;text-align:right">'+fmt(c.value)+'</span></div>';}).join('')+'<div style="margin-top:6px;border-top:1px solid '+BD()+';padding-top:8px;display:flex;justify-content:space-between"><span style="font-size:12px;color:'+M()+'">Total ingresos</span><span style="font-size:13px;font-weight:700;color:var(--green)">'+fmt(totalInc)+'</span></div></div>';
    }
    if(C.savAccts.length){
      const totSav=C.savAccts.reduce((s,a)=>s+a.balance,0);
      extraContent+='<div class="card"><span class="lbl">Ahorros e inversiones</span>'+C.savAccts.map((a,i)=>{const pct=totSav>0?Math.round(a.balance/totSav*100):0;return'<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:'+M()+'">'+( AICO[a.type]||'💰')+' '+esc(a.name)+'</span><span style="font-size:12px;font-weight:600;color:var(--green)">'+fmt(a.balance)+'</span></div><div style="height:7px;border-radius:4px;background:'+IN()+';overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--green);opacity:.75;border-radius:4px"></div></div></div>';}).join('')+'<div style="border-top:1px solid '+BD()+';padding-top:8px;display:flex;justify-content:space-between"><span style="font-size:12px;color:'+M()+'">Total</span><span style="font-size:13px;font-weight:700;color:var(--green)">'+fmt(totSav)+'</span></div></div>';
    }
  } else if(view==='año'){
    const yr=S.histYear,yrD=C.yrHist.find(y=>y.year===yr);
    const moInYr=C.hist.filter(h=>h.month.startsWith(yr)).reverse();
    content='<select id="selHY" class="sel" style="margin-bottom:14px">'+C.years.map(y=>'<option value="'+y+'"'+(y===yr?' selected':'')+'>'+ y+'</option>').join('')+'</select>'+(yrD?ts(yrD.income,yrD.expense,yrD.net):'')+buildBars(moInYr,'mes');
  } else {
    const ti=C.yrHist.reduce((s,y)=>s+y.income,0),te=C.yrHist.reduce((s,y)=>s+y.expense,0);
    content=ts(ti,te,ti-te)+buildBars(C.yrHist.slice().reverse(),'año')
      +'<div style="margin-top:12px">'+C.yrHist.map(yr=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid '+BD()+'"><span style="font-size:14px;font-weight:600">'+yr.year+'</span><div style="display:flex;gap:12px;font-size:13px"><span style="color:var(--green)">+'+fmt(yr.income)+'</span><span style="color:var(--red)">-'+fmt(yr.expense)+'</span><span style="font-weight:700;color:'+(yr.net>=0?'var(--green)':'var(--red)')+'">'+(yr.net>=0?'+':'')+fmt(yr.net)+'</span></div></div>').join('')+'</div>';
  }

  return '<div class="card"><div style="display:flex;gap:7px;margin-bottom:16px">'+[['mes','Por mes'],['año','Por año'],['global','Global']].map(([v,l])=>'<button class="sbtn" data-a="hview" data-val="'+v+'" style="border-color:'+(view===v?'var(--accent)':BD())+';background:'+(view===v?ABG():'transparent')+';color:'+(view===v?'var(--accent)':M())+';font-weight:'+(view===v?'600':'500')+'">'+l+'</button>').join('')+'</div>'+content+'</div>'+extraContent;
}

function buildPie(data){
  if(!data.length)return'';
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=0;
  const paths=data.map((d,i)=>{
    const a=d.value/total*2*Math.PI;
    const x1=Math.cos(angle-Math.PI/2)*72+90,y1=Math.sin(angle-Math.PI/2)*72+90;
    angle+=a;
    const x2=Math.cos(angle-Math.PI/2)*72+90,y2=Math.sin(angle-Math.PI/2)*72+90;
    return '<path d="M90,90 L'+x1+','+y1+' A72,72 0 '+(d.value/total>.5?1:0)+',1 '+x2+','+y2+' Z" fill="'+CC[i%CC.length]+'" stroke="'+BG()+'" stroke-width="2"/>';
  });
  const legend=data.slice(0,6).map((d,i)=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="width:11px;height:11px;border-radius:4px;background:'+CC[i%CC.length]+';flex-shrink:0"></div><span style="font-size:12px;color:'+M()+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(d.name)+'</span><span style="font-size:12px;font-weight:600">'+fmt(d.value)+'</span></div>').join('');
  return '<span class="lbl">Gastos por categoría</span><div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px"><svg width="180" height="180" viewBox="0 0 180 180">'+paths.join('')+'<circle cx="90" cy="90" r="40" fill="'+BG()+'"/><text x="90" y="87" text-anchor="middle" font-size="11" fill="'+M()+'" font-family="Inter,sans-serif">Total</text><text x="90" y="102" text-anchor="middle" font-size="13" fill="'+TX()+'" font-weight="600" font-family="Inter,sans-serif">'+fmt(total)+'</text></svg><div style="flex:1;min-width:120px">'+legend+'</div></div>';
}

function buildBars(data,ltype){
  if(!data.length)return'<p style="text-align:center;color:'+M()+';padding:16px 0">Sin datos</p>';
  const maxV=Math.max(...data.flatMap(d=>[d.income,d.expense]),1);
  const H=110,bw=13,pl=14,step=bw*2+4+10,W=Math.max(280,pl+data.length*step+20);
  const bs=data.map((d,i)=>{
    const x=pl+i*step,ih=d.income/maxV*(H-22),eh=d.expense/maxV*(H-22);
    const lbl=ltype==='año'?d.year:MSH[parseInt(d.month.slice(5,7))-1];
    return '<rect x="'+x+'" y="'+(H-ih)+'" width="'+bw+'" height="'+Math.max(ih,2)+'" fill="var(--green)" rx="2" opacity=".85"/><rect x="'+(x+bw+2)+'" y="'+(H-eh)+'" width="'+bw+'" height="'+Math.max(eh,2)+'" fill="var(--red)" rx="2" opacity=".85"/><text x="'+(x+bw)+'" y="'+(H+13)+'" text-anchor="middle" font-size="9" fill="'+M()+'" font-family="Inter,sans-serif">'+lbl+'</text>';
  });
  return '<div style="overflow-x:auto"><svg width="'+W+'" height="'+(H+18)+'" viewBox="0 0 '+W+' '+(H+18)+'"><rect x="0" y="0" width="'+W+'" height="'+H+'" rx="6" fill="'+IN()+'" opacity=".4"/><text x="8" y="14" font-size="9" fill="var(--green)" font-weight="600" font-family="Inter,sans-serif">■ Ingresos</text><text x="72" y="14" font-size="9" fill="var(--red)" font-weight="600" font-family="Inter,sans-serif">■ Gastos</text>'+bs.join('')+'</svg></div>';
}

  return '<div class="modal-bg" id="mBg"><div class="mbox">'+body+'</div></div>';
}

// ── WIRE ──────────────────────────────────────────────────────────
function wire(C){
  const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn);};
  const onC=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('change',fn);};
  const onI=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',fn);};
  const all=(sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener('click',fn));

  on('bDark',()=>dispatch('DARK'));
  on('bExp',()=>dispatch('EXPORT'));
  const fi=document.getElementById('fImp');
  if(fi)fi.addEventListener('change',e=>{if(e.target.files[0])dispatch('IMPORT',e.target.files[0]);e.target.value='';});
  all('.tab',function(){dispatch('TAB',parseInt(this.dataset.t));});
  on('calP',()=>dispatch('CAL_P'));
  on('calN',()=>dispatch('CAL_N'));
  on('bCalTog',()=>dispatch('CAL_TOG'));
  on('bTogUp',()=>dispatch('TOG_UP'));
  on('bTogNx',()=>dispatch('TOG_NX'));
  on('bAddAcc',()=>dispatch('MODAL',{type:'addAcc'}));
  on('bNewTx',()=>dispatch('MODAL',{type:'tx'}));
  on('bDue',()=>dispatch('MODAL',{type:'newDue'}));
  onI('inpS',e=>dispatch('SEARCH',e.target.value));
  onC('selMo',e=>dispatch('FMONTH',e.target.value));
  onC('selAcc',e=>dispatch('FACC',e.target.value));
  onC('selHM',e=>dispatch('HMONTH',e.target.value));
  onC('selHY',e=>dispatch('HYEAR',e.target.value));

  all('[data-a]',function(){
    const a=this.dataset.a;
    if(a==='pay-stmt') dispatch('MODAL',{type:'payStmt',cardId:this.dataset.cid,ymStr:this.dataset.ym});
    else if(a==='pay-due'){const due=S.dues.find(d=>d.id===this.dataset.did);if(due)dispatch('MODAL',{type:'payDue',due});}
    else if(a==='got-paid'){const tx=[...S.cashTxs,...S.creditExps].find(t=>t.id===this.dataset.tid);if(tx)dispatch('MODAL',{type:'gotPaid',tx});}
    else if(a==='edit-tx'){const tx=[...S.cashTxs,...S.creditExps].find(t=>t.id===this.dataset.tid);if(tx)dispatch('MODAL',{type:'tx',editId:tx.id,prefill:tx});}
    else if(a==='del-tx'){
      const tp=this.dataset.tt;
      if(tp==='cf'){
        const tx=S.cashTxs.find(t=>t.id===this.dataset.tid);
        if(tx)dispatch('MODAL',{type:'confirm',title:'Eliminar movimiento',msg:'¿Eliminar "'+tx.description+'"? Esta acción no se puede deshacer.',onConfirm:'DEL_CASH',payload:tx});
      }else{
        const exp=S.creditExps.find(e=>e.id===this.dataset.tid);
        if(exp)dispatch('MODAL',{type:'confirm',title:'Eliminar gasto',msg:'¿Eliminar "'+exp.description+'"'+(exp.installments>1?' y todas sus '+exp.installments+' cuotas':'')+' ? No se puede deshacer.',onConfirm:'DEL_CR',payload:exp});
      }
    }
    else if(a==='del-acc'){
      const acc=S.accounts.find(x=>x.id===this.dataset.aid);
      if(!acc)return;
      const refs=S.cashTxs.filter(t=>t.accountId===acc.id).length+S.creditExps.filter(e=>e.accountId===acc.id).length;
      const msg=refs>0?'"'+acc.name+'" tiene '+refs+' movimiento'+(refs===1?'':'s')+'. ¿Eliminar la cuenta y todos sus movimientos?':'¿Eliminar la cuenta "'+acc.name+'"?';
      dispatch('MODAL',{type:'confirm',title:'Eliminar cuenta',msg,onConfirm:'DEL_ACC',payload:acc.id});
    }
    else if(a==='cdates') dispatch('MODAL',{type:'cdates',cardId:this.dataset.cid,ymStr:this.dataset.ym});
    else if(a==='selcard') dispatch('SELCARD',this.dataset.cid);
    else if(a==='qplus') dispatch('MODAL',{type:'quick',accId:this.dataset.aid,isIncome:true});
    else if(a==='qminus') dispatch('MODAL',{type:'quick',accId:this.dataset.aid,isIncome:false});
    else if(a==='hview') dispatch('HVIEW',this.dataset.val);
  });

  on('bCopyExp',()=>{
    const ta=document.getElementById('expTA');
    if(ta){
      ta.select();ta.setSelectionRange(0,99999);
      try{
        navigator.clipboard.writeText(ta.value).then(()=>alert('✅ Copiado al portapapeles')).catch(()=>{document.execCommand('copy');alert('✅ Copiado');});
      }catch(e){document.execCommand('copy');alert('✅ Copiado');}
    }
  });
  on('bCls',()=>dispatch('MODAL',null));
  on('bCancel',()=>dispatch('MODAL',null));

  all('[data-seg]',function(){
    const seg=this.dataset.seg,val=this.dataset.val;
    const p=val==='true'?true:val==='false'?false:isNaN(val)?val:Number(val);
    if(seg==='payMode'){MF.payMode=val;syncMF();render();}
    else if(seg==='isIncome'){MF.isIncome=p;syncMF();render();}
    else if(seg==='accType'){MF.accType=val;syncMF();render();}
    else if(seg==='method'){MF.method=val;syncMF();render();}
    else if(seg==='inst'){MF.installments=p===0?(MF.installments>1?MF.installments:3):1;syncMF();render();}
    else if(seg==='qt'){MF.isIncome=val==='yield'?'yield':val==='transfer'?'transfer':p;MF.category=undefined;syncMF();render();}
  });

  on('togS',()=>{MF.shared=!(MF.shared!=null?MF.shared:(S.modal&&S.modal.prefill?S.modal.prefill.shared:false));syncMF();render();});
  on('togR',()=>{MF.recurring=!MF.recurring;syncMF();render();});
  onI('mPct',function(){const el=document.getElementById('pctL');if(el)el.textContent=this.value+'%';MF.myPct=parseInt(this.value);});
  on('bSave',()=>save(C));
}

function syncMF(){
  ['mDesc','mAmt','mCat','mCdate','mPdate','mAcc','mCard','mInst','mSW','mName','mDate','mBal','mClosing','mDue','mToAcc'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)MF[id]=el.type==='number'?parseFloat(el.value)||0:el.value;
  });
}
const gv=(id,def)=>{const el=document.getElementById(id);return el?el.value:(def||'');};
const gn=(id,def)=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:(def||0);};

function save(C){
  const m=S.modal;
  if(!m)return;

  if(m.type==='confirm'){
    dispatch(m.onConfirm,m.payload);
    return;
  }
  if(m.type==='quick'){
    const amount=gn('mAmt');if(!amount)return;
    const isIn=MF.isIncome!=null?MF.isIncome:m.isIncome;
    const isY=isIn==='yield',isTr=isIn==='transfer';
    if(isTr){const toId=gv('mToAcc');if(!toId)return;dispatch('TRANSFER',{fromId:m.accId,toId,amount});}
    else dispatch('QUICK',{accId:m.accId,amount,isIncome:isY?true:!!isIn,category:isY?'Rendimientos':gv('mCat'),description:gv('mDesc')||'Movimiento'});
    return;
  }
  if(m.type==='tx'){
    const mode=MF.payMode||(m.prefill&&m.prefill.type==='cr'?'credit':'cash');
    const desc=gv('mDesc'),amount=gn('mAmt'),cat=gv('mCat');
    if(!desc||!amount)return;
    if(mode==='credit'){
      const cid=gv('mAcc'),cd=gv('mCdate',td());
      if(!S.cardDates[cid+'::'+ymOf(cd)]){dispatch('MODAL',{type:'cdates',cardId:cid,ymStr:ymOf(cd)});return;}
      const instEl=document.getElementById('mInst');
      const inst=instEl?parseInt(instEl.value)||1:(MF.installments||( m.prefill?m.prefill.installments:1)||1);
      const shared=MF.shared!=null?MF.shared:(m.prefill?m.prefill.shared:false)||false;
      const myPct=shared?(parseInt((document.getElementById('mPct')||{}).value)||50):100;
      dispatch('SAVE_CR',{type:'cr',description:desc,amount,category:cat,consumptionDate:cd,accountId:cid,installments:inst,shared,myPct,deductMode:'mine',sharedWith:gv('mSW'),debtPaid:false,editId:m.editId});
    }else{
      const isIn=MF.isIncome!=null?MF.isIncome:!!(m.prefill&&m.prefill.isIncome);
      const shared=MF.shared!=null?MF.shared:(m.prefill?m.prefill.shared:false)||false;
      const myPct=shared?(parseInt((document.getElementById('mPct')||{}).value)||50):100;
      dispatch('SAVE_CASH',{type:'cf',description:desc,amount,category:cat,consumDate:gv('mCdate',td()),payDate:gv('mPdate',td()),accountId:gv('mAcc'),isIncome:isIn,shared,myPct,deductMode:'mine',sharedWith:gv('mSW'),debtPaid:false,editId:m.editId});
    }
    return;
  }
  if(m.type==='newDue'){const name=gv('mName'),amount=gn('mAmt'),dueDate=gv('mDate',td());if(!name||!amount)return;dispatch('SAVE_DUE',{name,amount,dueDate,recurring:MF.recurring||false});return;}
  if(m.type==='payDue'){dispatch('PAY_DUE',{due:m.due,method:MF.method||'cash',accId:gv('mAcc'),cardId:gv('mCard'),inst:gn('mInst',1)});return;}
  if(m.type==='payStmt'){dispatch('PAY_STMT',{cardId:m.cardId,ymStr:m.ymStr,amount:gn('mAmt'),payDate:gv('mDate',td()),fromId:gv('mAcc')});return;}
  if(m.type==='gotPaid'){dispatch('GOT_PAID',{tx:m.tx,amount:gn('mAmt'),method:MF.method||'cash',toId:gv('mAcc')});return;}
  if(m.type==='cdates'){const cl=gv('mClosing'),due=gv('mDue');if(!cl||!due)return;dispatch('CDATES',{cardId:m.cardId,ymStr:m.ymStr,closing:cl,due});return;}
  if(m.type==='addAcc'){const name=gv('mName');if(!name)return;dispatch('ADD_ACC',{name,type:MF.accType||'debit',balance:gn('mBal')});return;}
}

render();
</script>
</body>
