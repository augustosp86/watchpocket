<script>
// ── UTILS ─────────────────────────────────────────────────────────
const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
const td=()=>new Date().toISOString().slice(0,10);
const ym=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const ymOf=s=>s?s.slice(0,7):'';
const addMo=(s,n)=>{const y=parseInt(s.slice(0,4)),m=parseInt(s.slice(5,7))-1,d=new Date(y,m+n,1);return ym(d.getFullYear(),d.getMonth());};
const thisYM=ym(cy,cm),nextYM=addMo(thisYM,1);
const fmt=n=>'$'+Number(n||0).toLocaleString('es-AR',{maximumFractionDigits:0});
const D=(day,mo,yr)=>new Date(yr||cy,mo!=null?mo:cm,day).toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const CATS=['Alimentación','Transporte','Servicios','Entretenimiento','Salud','Ropa','Educación','Viajes','Hogar','Otros'];
const ICATS=['Sueldo','Honorarios','Rendimientos','Dividendos','Alquiler cobrado','Transferencia recibida','Otros ingresos'];
const MOS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MSH=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DYS=['D','L','M','X','J','V','S'];
const CC=['#e8956d','#7fb5ae','#c084fc','#60a5fa','#f87171','#a78bfa','#4ade80','#fbbf24','#38bdf8','#94a3b8'];
const ATYPES=[
  {v:'cash',l:'💵 Efectivo',liq:true},
  {v:'debit',l:'🏦 Débito / CA',liq:true},
  {v:'savliq',l:'💰 Cta. remunerada',liq:true},
  {v:'invliq',l:'📈 Fondo común',liq:true},
  {v:'sav',l:'🎯 Ahorro',liq:false},
  {v:'inv',l:'📊 Inversión',liq:false},
  {v:'credit',l:'💳 Tarjeta de crédito',liq:false},
];
const AICO={cash:'💵',debit:'🏦',savliq:'💰',invliq:'📈',sav:'🎯',inv:'📊',credit:'💳'};
const isLiq=t=>['cash','debit','savliq','invliq'].includes(t);
const isSav=t=>['sav','inv','savliq','invliq'].includes(t);
// ── CASHFLOW LOGIC ────────────────────────────────────────────────
function firstYM(cd,cardId,cdates){
  const dt=new Date(cd+'T12:00:00');
  const cym=ym(dt.getFullYear(),dt.getMonth());
  const cl=cdates[cardId+'::'+cym]?.closing;
  if(!cl)return addMo(cym,1);
  return dt<=new Date(cl+'T12:00:00')?cym:addMo(cym,1);
}
function genCharges(exp,cdates){
  const n=exp.installments||1,pq=Math.round(exp.amount/n),f1=firstYM(exp.consumptionDate,exp.accountId,cdates);
  return Array.from({length:n},(_,i)=>({id:exp.id+'::c'+(i+1),expenseId:exp.id,description:exp.description,category:exp.category,amount:pq,yearMonth:addMo(f1,i),idx:i+1,total:n,accountId:exp.accountId}));
}
function getStmt(cardId,ymStr,charges){
  const ch=charges.filter(c=>c.accountId===cardId&&c.yearMonth===ymStr);
  return{charges:ch,total:ch.reduce((s,c)=>s+c.amount,0)};
}
// ── STATE ─────────────────────────────────────────────────────────
let S={
  dark:false,tab:0,
  accounts:[
    {id:'a1',name:'Efectivo',type:'cash',balance:15000},
    {id:'a2',name:'Galicia CA',type:'debit',balance:82500},
    {id:'a3',name:'Brubank',type:'debit',balance:43200},
    {id:'a4',name:'Visa Galicia',type:'credit',balance:0},
    {id:'a5',name:'Mastercard',type:'credit',balance:0},
    {id:'a6',name:'Fondo IOL',type:'invliq',balance:120000},
    {id:'a7',name:'Reserva vacaciones',type:'sav',balance:50000},
    {id:'a8',name:'Fondo ahorro',type:'inv',balance:80000},
  ],
  cashTxs:[
    {id:'t1',type:'cf',description:'Sueldo',amount:350000,category:'Sueldo',consumDate:D(1),payDate:D(1),accountId:'a2',isIncome:true,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t2',type:'cf',description:'Supermercado',amount:24000,category:'Alimentación',consumDate:D(10),payDate:D(10),accountId:'a2',isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t3',type:'cf',description:'Farmacia',amount:8500,category:'Salud',consumDate:D(8),payDate:D(8),accountId:'a1',isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t4',type:'cf',description:'Uber',amount:6800,category:'Transporte',consumDate:D(12),payDate:D(12),accountId:'a1',isIncome:false,shared:true,myPct:50,deductMode:'full',sharedWith:'Marcos',debtPaid:false},
  ],
  creditExps:[
    {id:'c1',type:'cr',description:'Notebook',amount:360000,category:'Educación',consumptionDate:D(15),accountId:'a4',installments:12,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'c2',type:'cr',description:'Netflix',amount:5200,category:'Entretenimiento',consumptionDate:D(8),accountId:'a4',installments:1,shared:true,myPct:33,deductMode:'mine',sharedWith:'Ana y Pedro',debtPaid:false},
    {id:'c3',type:'cr',description:'Bicicleta',amount:120000,category:'Transporte',consumptionDate:D(22),accountId:'a5',installments:6,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
  ],
  dues:[
    {id:'d1',name:'Expensas',amount:85000,dueDate:D(now.getDate()+3),recurring:true,status:'pending'},
    {id:'d2',name:'Luz',amount:12400,dueDate:D(now.getDate()+7),recurring:false,status:'pending'},
    {id:'d3',name:'Internet',amount:6800,dueDate:D(5,cm+1),recurring:true,status:'pending'},
    {id:'d4',name:'Alquiler',amount:180000,dueDate:D(1,cm+1),recurring:true,status:'pending'},
  ],
  cardDates:{
    ['a4::'+thisYM]:{closing:D(20),due:D(10,cm+1)},
    ['a5::'+thisYM]:{closing:D(18),due:D(8,cm+1)},
  },
  stmtPays:[],
  modal:null,calMo:cm,calYr:cy,
  search:'',fMonth:thisYM,fAcc:'all',
  showAllUp:false,showNextDetail:false,selCard:'a4',
  histView:'mes',histMonth:thisYM,histYear:String(cy),
};
let MF={};
// ── COMPUTED ──────────────────────────────────────────────────────
function comp(){
  const allCharges=S.creditExps.flatMap(e=>genCharges(e,S.cardDates));
  const cards=S.accounts.filter(a=>a.type==='credit');
  const liqAccts=S.accounts.filter(a=>isLiq(a.type));
  const savAccts=S.accounts.filter(a=>isSav(a.type));
  const nonCredit=S.accounts.filter(a=>a.type!=='credit');
  const totalLiq=liqAccts.reduce((s,a)=>s+a.balance,0);
  const committed=cards.reduce((sum,card)=>{
    const relYMs=[...new Set(Object.entries(S.cardDates).filter(([k,v])=>k.startsWith(card.id+'::')&&ymOf(v.due)===thisYM).map(([k])=>k.split('::')[1]))];
    return sum+relYMs.reduce((s,ym2)=>{
      if(S.stmtPays.some(sp=>sp.cardId===card.id&&sp.yearMonth===ym2))return s;
      return s+getStmt(card.id,ym2,allCharges).total;
    },0);
  },0);
  const duesAmt=S.dues.filter(d=>ymOf(d.dueDate)===thisYM&&d.status==='pending').reduce((s,d)=>s+d.amount,0);
  const netAvail=totalLiq-committed-duesAmt;
  const thisCash=S.cashTxs.filter(tx=>ymOf(tx.payDate)===thisYM);
  const thisInc=thisCash.filter(tx=>tx.isIncome).reduce((s,tx)=>s+tx.amount,0);
  const thisExp=thisCash.filter(tx=>!tx.isIncome).reduce((s,tx)=>s+(tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount),0);
  const debts=[...S.cashTxs,...S.creditExps].filter(tx=>tx.shared&&!tx.isIncome&&!tx.debtPaid);
  const tod=new Date(),fut=new Date();fut.setDate(fut.getDate()+45);const past=new Date();past.setDate(past.getDate()-30);
  const upcoming=[];
  S.dues.filter(d=>d.status==='pending').forEach(d=>{const dt=new Date(d.dueDate+'T12:00:00');if(dt>=past&&dt<=fut)upcoming.push({type:'due',id:d.id,name:d.name,amount:d.amount,date:d.dueDate,raw:d,over:dt<tod});});
  cards.forEach(card=>{[thisYM,nextYM].forEach(y2=>{const dates=S.cardDates[card.id+'::'+y2];if(dates?.due){const dt=new Date(dates.due+'T12:00:00'),stmt=getStmt(card.id,y2,allCharges),paid=S.stmtPays.some(sp=>sp.cardId===card.id&&sp.yearMonth===y2);if(!paid&&dt>=past&&dt<=fut&&stmt.total>0)upcoming.push({type:'card',id:'c::'+card.id+'::'+y2,name:card.name,amount:stmt.total,date:dates.due,cardId:card.id,ymStr:y2,over:dt<tod});}});});
  upcoming.sort((a,b)=>a.date.localeCompare(b.date));
  const cardTots=cards.map(c=>({name:c.name,total:getStmt(c.id,nextYM,allCharges).total,cardId:c.id})).filter(c=>c.total>0);
  const nextDues=S.dues.filter(d=>ymOf(d.dueDate)===nextYM&&d.status==='pending');
  const nextTotal=cardTots.reduce((s,c)=>s+c.total,0)+nextDues.reduce((s,d)=>s+d.amount,0);
  const moMap={};
  S.cashTxs.forEach(tx=>{const mk=ymOf(tx.payDate);if(!moMap[mk])moMap[mk]={month:mk,income:0,expense:0,txs:[]};if(tx.isIncome)moMap[mk].income+=tx.amount;else moMap[mk].expense+=tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount;moMap[mk].txs.push(tx);});
  const hist=Object.values(moMap).sort((a,b)=>b.month.localeCompare(a.month)).map(d=>({...d,income:Math.round(d.income),expense:Math.round(d.expense),net:Math.round(d.income-d.expense)}));
  const yrMap={};hist.forEach(h=>{const yr=h.month.slice(0,4);if(!yrMap[yr])yrMap[yr]={year:yr,income:0,expense:0};yrMap[yr].income+=h.income;yrMap[yr].expense+=h.expense;});
  const yrHist=Object.values(yrMap).sort((a,b)=>b.year.localeCompare(a.year)).map(d=>({...d,net:Math.round(d.income-d.expense)}));
  const years=[...new Set(hist.map(h=>h.month.slice(0,4)))].sort((a,b)=>b.localeCompare(a));
  const months=[];for(let i=-12;i<=2;i++){const d2=new Date(cy,cm+i,1);months.push(ym(d2.getFullYear(),d2.getMonth()));}
  const filtTxs=[...S.cashTxs,...S.creditExps].filter(tx=>{
    const pd=tx.payDate||tx.consumptionDate||tx.consumDate;
    const ch=tx.type==='cr'?genCharges(tx,S.cardDates):[];
    const mM=S.fMonth==='all'||(tx.type==='cr'?ch.some(c=>c.yearMonth===S.fMonth):ymOf(pd)===S.fMonth);
    return mM&&(S.fAcc==='all'||tx.accountId===S.fAcc)&&(!S.search||tx.description.toLowerCase().includes(S.search.toLowerCase()));
  }).sort((a,b)=>{const da=a.payDate||a.consumptionDate||a.consumDate,db=b.payDate||b.consumptionDate||b.consumDate;return db.localeCompare(da);});
  return{allCharges,cards,liqAccts,savAccts,nonCredit,totalLiq,committed,duesAmt,netAvail,thisInc,thisExp,debts,upcoming,cardTots,nextDues,nextTotal,hist,yrHist,years,months,filtTxs};
}
// ── DISPATCH ──────────────────────────────────────────────────────
function dispatch(a,p){
  const apply=(accs,id,delta)=>accs.map(x=>x.id===id?{...x,balance:Math.round((x.balance+delta)*100)/100}:x);
  const imp=tx=>tx.isIncome?tx.amount:-(tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount);
  if(a==='DARK'){S.dark=!S.dark;}
  else if(a==='TAB'){S.tab=p;}
  else if(a==='MODAL'){S.modal=p;MF={};}
  else if(a==='CAL_P'){const d=new Date(S.calYr,S.calMo-1,1);S.calMo=d.getMonth();S.calYr=d.getFullYear();}
  else if(a==='CAL_N'){const d=new Date(S.calYr,S.calMo+1,1);S.calMo=d.getMonth();S.calYr=d.getFullYear();}
  else if(a==='TOG_UP'){S.showAllUp=!S.showAllUp;}
  else if(a==='TOG_NX'){S.showNextDetail=!S.showNextDetail;}
  else if(a==='SEARCH'){S.search=p;}
  else if(a==='FMONTH'){S.fMonth=p;}
  else if(a==='FACC'){S.fAcc=p;}
  else if(a==='SELCARD'){S.selCard=p;}
  else if(a==='HVIEW'){S.histView=p;}
  else if(a==='HMONTH'){S.histMonth=p;}
  else if(a==='HYEAR'){S.histYear=p;}
  else if(a==='SAVE_CASH'){
    const d=p;
    if(d.editId){const old=S.cashTxs.find(t=>t.id===d.editId);S.accounts=apply(apply(S.accounts,old.accountId,-imp(old)),d.accountId,imp(d));S.cashTxs=S.cashTxs.map(t=>t.id===d.editId?{...d,id:d.editId}:t);}
    else{S.accounts=apply(S.accounts,d.accountId,imp(d));S.cashTxs=[...S.cashTxs,{...d,id:'tx-'+Date.now()}];}
    S.modal=null;
  }
  else if(a==='QUICK'){
    const{accId,amount,isIncome,category,description}=p;
    S.accounts=apply(S.accounts,accId,isIncome?amount:-amount);
    S.cashTxs=[...S.cashTxs,{id:'tx-'+Date.now(),type:'cf',description,amount,category,consumDate:td(),payDate:td(),accountId:accId,isIncome,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
    S.modal=null;
  }
  else if(a==='TRANSFER'){
    const{fromId,toId,amount}=p;
    S.accounts=apply(apply(S.accounts,fromId,-amount),toId,amount);
    S.modal=null;
  }
  else if(a==='SAVE_CR'){
    const d=p;
    if(d.editId)S.creditExps=S.creditExps.map(e=>e.id===d.editId?{...d,id:d.editId}:e);
    else S.creditExps=[...S.creditExps,{...d,id:'cr-'+Date.now()}];
    S.modal=null;
  }
  else if(a==='DEL_CASH'){S.accounts=apply(S.accounts,p.accountId,-imp(p));S.cashTxs=S.cashTxs.filter(t=>t.id!==p.id);}
  else if(a==='DEL_CR'){if(p.installments>1&&!confirm('¿Eliminar todas las cuotas?'))return;S.creditExps=S.creditExps.filter(e=>e.id!==p.id);}
  else if(a==='PAY_STMT'){
    const{cardId,ymStr,amount,payDate,fromId}=p;
    S.accounts=apply(S.accounts,fromId,-amount);
    S.stmtPays=[...S.stmtPays,{id:'sp-'+Date.now(),cardId,yearMonth:ymStr,amount,payDate,fromId}];
    S.modal=null;
  }
  else if(a==='PAY_DUE'){
    const{due,method,accId,cardId,inst}=p;
    if(method==='cash'){S.accounts=apply(S.accounts,accId,-due.amount);S.cashTxs=[...S.cashTxs,{id:'tx-'+Date.now(),type:'cf',description:due.name,amount:due.amount,category:'Servicios',consumDate:due.dueDate,payDate:td(),accountId:accId,isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];}
    else S.creditExps=[...S.creditExps,{id:'cr-'+Date.now(),type:'cr',description:due.name,amount:due.amount,category:'Servicios',consumptionDate:td(),accountId:cardId,installments:inst||1,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
    S.dues=S.dues.map(d=>d.id===due.id?{...d,status:'paid'}:d);S.modal=null;
  }
  else if(a==='GOT_PAID'){
    const{tx,amount,method,toId}=p;
    if(method!=='other'){S.accounts=apply(S.accounts,toId,amount);S.cashTxs=[...S.cashTxs,{id:'pay-'+Date.now(),type:'cf',description:'Cobro: '+tx.description,amount,category:'Otros ingresos',consumDate:td(),payDate:td(),accountId:toId,isIncome:true,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];}
    if(tx.type==='cf')S.cashTxs=S.cashTxs.map(t=>t.id===tx.id?{...t,debtPaid:true}:t);
    else S.creditExps=S.creditExps.map(e=>e.id===tx.id?{...e,debtPaid:true}:e);
    S.modal=null;
  }
  else if(a==='CDATES'){const{cardId,ymStr,closing,due}=p;S.cardDates={...S.cardDates,[cardId+'::'+ymStr]:{closing,due}};S.modal=null;}
  else if(a==='ADD_ACC'){S.accounts=[...S.accounts,{...p,id:'a-'+Date.now(),balance:parseFloat(p.balance||0)}];S.modal=null;}
  else if(a==='SAVE_DUE'){S.dues=[...S.dues,{...p,id:'d-'+Date.now(),status:'pending'}];S.modal=null;}
  else if(a==='EXPORT'){doExport();}
  else if(a==='IMPORT'){doImport(p);}
  else if(a==='DEL_ACC'){
    const accId=p;
    const acc=S.accounts.find(x=>x.id===accId);
    if(!acc) return;
    const cashRefs=S.cashTxs.filter(t=>t.accountId===accId).length;
    const crRefs=S.creditExps.filter(e=>e.accountId===accId).length;
    const refCount=cashRefs+crRefs;
    let msg=`¿Eliminar “${acc.name}”?`;
    if(refCount>0) msg+=`\n\nTiene ${refCount} movimiento${refCount>1?'s':''} asociado${refCount>1?'s':''}.\nSe eliminarán también.`;
    if(!confirm(msg)) return;
    S.accounts=S.accounts.filter(x=>x.id!==accId);
    S.cashTxs=S.cashTxs.filter(t=>t.accountId!==accId);
    S.creditExps=S.creditExps.filter(e=>e.accountId!==accId);
    S.stmtPays=S.stmtPays.filter(sp=>sp.fromId!==accId&&sp.cardId!==accId);
    if(acc.type==='credit'){
      Object.keys(S.cardDates).forEach(k=>{if(k.startsWith(accId+'::')) delete S.cardDates[k];});
    }
  }
  render();
}
