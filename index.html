<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cuentas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#fff;--border:#e8e0d0;--text:#1e1a16;--muted:#8a7d6e;
  --accent:#c17f3a;--accent2:#e8a44a;--accentbg:#fef6ea;
  --green:#3d9a6a;--red:#c53030;--amber:#c47a1a;--blue:#2b6cb0;--teal:#2a8a8a;
  --inp:#f0ebe0;--shadow:0 2px 12px rgba(0,0,0,.07);
}
.dk{--bg:#161311;--card:#1e1b18;--border:#2d2820;--text:#f0ebe0;--muted:#7a6e62;--inp:#252017;--accentbg:rgba(193,127,58,.12)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s}
/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
/* layout */
main{max-width:480px;margin:0 auto;padding:14px 14px 110px}
/* header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:0 1px 12px rgba(0,0,0,.06)}
.logo{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:400;color:var(--accent);letter-spacing:-.3px}
.logo span{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-top:-2px}
/* tabs */
.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;gap:0;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 15px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:'Inter',inherit;color:var(--muted);margin-bottom:-1px;transition:color .15s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
/* inputs */
.inp{background:var(--inp);border:1.5px solid transparent;border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
/* buttons */
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;transition:opacity .2s;letter-spacing:.02em}
.btn-p:hover{opacity:.9}
.btn-s{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;transition:all .2s}
.btn-s:hover{border-color:var(--accent);color:var(--accent)}
.sm{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:opacity .15s}
.sm:hover{opacity:.85}
.sm.green{background:var(--green)}
.sm.ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
/* labels */
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:block}
.flbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
/* modal */
.modal-bg{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding-bottom:32px}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:14px auto 0}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 16px;border-bottom:1px solid var(--border)}
.mhead span{font-size:16px;font-weight:600}
.mhead button{background:var(--inp);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.mhead button:hover{background:var(--border)}
.mbody{padding:16px 20px 0;display:flex;flex-direction:column;gap:14px}
/* segments */
.seg{display:flex;gap:7px;flex-wrap:wrap}
.sbtn{padding:8px 11px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;flex:1;min-width:0;white-space:nowrap;transition:all .15s}
/* account rows */
.arow{display:flex;align-items:center;padding:10px 13px;background:var(--inp);border-radius:13px;margin-bottom:7px;gap:9px;transition:background .15s}
.arow:hover{background:var(--border)}
/* upcoming */
.upitem{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--inp);border-radius:13px;margin-bottom:8px}
.upitem.urg{background:rgba(197,48,48,.07);border:1px solid rgba(197,48,48,.18)}
/* pills */
.pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
/* transaction rows */
.txrow{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
/* shared / info boxes */
.sbox{background:var(--inp);border-radius:14px;padding:13px;margin-top:4px}
.ibox{padding:11px 13px;background:var(--inp);border-radius:12px;font-size:12px;color:var(--muted);line-height:1.65}
/* progress */
.prog{height:6px;border-radius:4px;background:var(--inp);overflow:hidden}
/* fabs */
.fab-wrap{position:fixed;bottom:26px;right:20px;display:flex;flex-direction:column;gap:11px;align-items:flex-end;z-index:50}
.fab{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:50%;width:58px;height:58px;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(193,127,58,.45);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:hover{transform:scale(1.07)}
.fab-sm{background:var(--card);border:1.5px solid var(--border);color:var(--muted);border-radius:50%;width:44px;height:44px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .15s}
.fab-sm:hover{border-color:var(--accent);color:var(--accent)}
/* header buttons */
.hbtn{background:var(--inp);border:none;border-radius:9px;padding:6px 11px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.hbtn:hover{background:var(--border);color:var(--text)}
/* quick buttons */
.qbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1;transition:all .2s}
.qbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accentbg);transform:scale(1.1)}
/* section divider */
.sdiv{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:16px 0 9px;padding-left:1px;display:flex;align-items:center;gap:8px}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border)}
/* badge */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
/* stat cards */
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.stat-c{text-align:center;padding:11px 8px;border-radius:14px}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{display:flex;flex-direction:column;align-items:center;cursor:default}
.cal-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;transition:all .15s}
.cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
/* toggle */
.tog{width:44px;height:25px;border-radius:13px;position:relative;cursor:pointer;border:none;flex-shrink:0;display:inline-block;transition:background .2s}
.tok{position:absolute;top:3px;width:19px;height:19px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 5px rgba(0,0,0,.22)}
input[type=range]{accent-color:var(--accent);width:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* animations */
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mbox{animation:slideUp .22s ease}
/* dark mode icon fix */
select option{background:var(--card)}
</style>
</head>
<body id="B"><div id="R"></div>
<script>
const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
const td=()=>new Date().toISOString().slice(0,10);
const ym=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const ymOf=s=>s?s.slice(0,7):'';
const addMo=(s,n)=>{const y=parseInt(s.slice(0,4)),m=parseInt(s.slice(5,7))-1,d=new Date(y,m+n,1);return ym(d.getFullYear(),d.getMonth());};
const thisYM=ym(cy,cm),nextYM=addMo(thisYM,1);
const fmt=n=>'$'+Number(n||0).toLocaleString('es-AR',{maximumFractionDigits:0});
const D=(day,mo,yr)=>new Date(yr||cy,mo!=null?mo:cm,day).toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const CATS=['Alimentación','Transporte','Servicios','Entretenimiento','Salud','Ropa','Educación','Viajes','Hogar','Otros'];
const ICATS=['Sueldo','Honorarios','Rendimientos','Dividendos','Alquiler cobrado','Transferencia recibida','Otros ingresos'];
const MOS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MSH=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DYS=['D','L','M','X','J','V','S'];
const CC=['#e8956d','#7fb5ae','#c084fc','#60a5fa','#f87171','#a78bfa','#4ade80','#fbbf24','#38bdf8','#94a3b8'];
const ATYPES=[
  {v:'cash',l:'💵 Efectivo',liq:true},
  {v:'debit',l:'🏦 Débito / CA',liq:true},
  {v:'savliq',l:'💰 Cta. remunerada (disp.)',liq:true},
  {v:'invliq',l:'📈 Fondo común (disp.)',liq:true},
  {v:'sav',l:'🎯 Ahorro / Reserva',liq:false},
  {v:'inv',l:'📊 Fondo / Inversión',liq:false},
  {v:'credit',l:'💳 Tarjeta de crédito',liq:false},
];
const AICO={cash:'💵',debit:'🏦',savliq:'💰',invliq:'📈',sav:'🎯',inv:'📊',credit:'💳'};
const isLiq=t=>['cash','debit','savliq','invliq'].includes(t);
const isSav=t=>['sav','inv','savliq','invliq'].includes(t);

function firstYM(cd,cardId,cdates){
  const dt=new Date(cd+'T12:00:00');
  const cym=ym(dt.getFullYear(),dt.getMonth());
  const cl=cdates[cardId+'::'+cym]?.closing;
  if(!cl)return addMo(cym,1);
  return dt<=new Date(cl+'T12:00:00')?cym:addMo(cym,1);
}
function genCharges(exp,cdates){
  const n=exp.installments||1,pq=Math.round(exp.amount/n),f1=firstYM(exp.consumptionDate,exp.accountId,cdates);
  return Array.from({length:n},(_,i)=>({id:exp.id+'::c'+(i+1),expenseId:exp.id,description:exp.description,category:exp.category,amount:pq,yearMonth:addMo(f1,i),idx:i+1,total:n,accountId:exp.accountId}));
}
function getStmt(cardId,ymStr,charges){
  const ch=charges.filter(c=>c.accountId===cardId&&c.yearMonth===ymStr);
  return{charges:ch,total:ch.reduce((s,c)=>s+c.amount,0)};
}

let S={
  dark:false,tab:0,calOpen:false,
  accounts:[
    {id:'a1',name:'Efectivo',type:'cash',balance:15000},
    {id:'a2',name:'Galicia CA',type:'debit',balance:82500},
    {id:'a3',name:'Brubank',type:'debit',balance:43200},
    {id:'a4',name:'Visa Galicia',type:'credit',balance:0},
    {id:'a5',name:'Mastercard',type:'credit',balance:0},
    {id:'a6',name:'Fondo IOL',type:'invliq',balance:120000},
    {id:'a7',name:'Reserva vacaciones',type:'sav',balance:50000},
    {id:'a8',name:'Fondo ahorro',type:'inv',balance:80000},
  ],
  cashTxs:[
    {id:'t1',type:'cf',description:'Sueldo',amount:350000,category:'Sueldo',consumDate:D(1),payDate:D(1),accountId:'a2',isIncome:true,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t2',type:'cf',description:'Supermercado',amount:24000,category:'Alimentación',consumDate:D(10),payDate:D(10),accountId:'a2',isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t3',type:'cf',description:'Farmacia',amount:8500,category:'Salud',consumDate:D(8),payDate:D(8),accountId:'a1',isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'t4',type:'cf',description:'Uber',amount:6800,category:'Transporte',consumDate:D(12),payDate:D(12),accountId:'a1',isIncome:false,shared:true,myPct:50,deductMode:'full',sharedWith:'Marcos',debtPaid:false},
  ],
  creditExps:[
    {id:'c1',type:'cr',description:'Notebook',amount:360000,category:'Educación',consumptionDate:D(15),accountId:'a4',installments:12,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
    {id:'c2',type:'cr',description:'Netflix',amount:5200,category:'Entretenimiento',consumptionDate:D(8),accountId:'a4',installments:1,shared:true,myPct:33,deductMode:'mine',sharedWith:'Ana y Pedro',debtPaid:false},
    {id:'c3',type:'cr',description:'Bicicleta',amount:120000,category:'Transporte',consumptionDate:D(22),accountId:'a5',installments:6,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false},
  ],
  dues:[
    {id:'d1',name:'Expensas',amount:85000,dueDate:D(now.getDate()+3),recurring:true,status:'pending'},
    {id:'d2',name:'Luz',amount:12400,dueDate:D(now.getDate()+7),recurring:false,status:'pending'},
    {id:'d3',name:'Internet',amount:6800,dueDate:D(5,cm+1),recurring:true,status:'pending'},
    {id:'d4',name:'Alquiler',amount:180000,dueDate:D(1,cm+1),recurring:true,status:'pending'},
  ],
  cardDates:{
    ['a4::'+thisYM]:{closing:D(20),due:D(10,cm+1)},
    ['a5::'+thisYM]:{closing:D(18),due:D(8,cm+1)},
  },
  stmtPays:[],
  modal:null,calMo:cm,calYr:cy,
  search:'',fMonth:thisYM,fAcc:'all',
  showAllUp:false,showNextDetail:false,selCard:'a4',
  histView:'mes',histMonth:thisYM,histYear:String(cy),
};
let MF={};

function comp(){
  const allCharges=S.creditExps.flatMap(e=>genCharges(e,S.cardDates));
  const cards=S.accounts.filter(a=>a.type==='credit');
  const liqAccts=S.accounts.filter(a=>isLiq(a.type));
  const savAccts=S.accounts.filter(a=>isSav(a.type));
  const nonCredit=S.accounts.filter(a=>a.type!=='credit');
  const totalLiq=liqAccts.reduce((s,a)=>s+a.balance,0);
  const committed=cards.reduce((sum,card)=>{
    const relYMs=[...new Set(Object.entries(S.cardDates).filter(([k,v])=>k.startsWith(card.id+'::')&&ymOf(v.due)===thisYM).map(([k])=>k.split('::')[1]))];
    return sum+relYMs.reduce((s,ym2)=>{
      if(S.stmtPays.some(sp=>sp.cardId===card.id&&sp.yearMonth===ym2))return s;
      return s+getStmt(card.id,ym2,allCharges).total;
    },0);
  },0);
  const duesAmt=S.dues.filter(d=>ymOf(d.dueDate)===thisYM&&d.status==='pending').reduce((s,d)=>s+d.amount,0);
  const netAvail=totalLiq-committed-duesAmt;
  const thisCash=S.cashTxs.filter(tx=>ymOf(tx.payDate)===thisYM);
  const thisInc=thisCash.filter(tx=>tx.isIncome).reduce((s,tx)=>s+tx.amount,0);
  const thisExp=thisCash.filter(tx=>!tx.isIncome).reduce((s,tx)=>s+(tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount),0);
  const debts=[...S.cashTxs,...S.creditExps].filter(tx=>tx.shared&&!tx.isIncome&&!tx.debtPaid);
  const tod=new Date(),fut=new Date();fut.setDate(fut.getDate()+45);const past=new Date();past.setDate(past.getDate()-30);
  const upcoming=[];
  S.dues.filter(d=>d.status==='pending').forEach(d=>{const dt=new Date(d.dueDate+'T12:00:00');if(dt>=past&&dt<=fut)upcoming.push({type:'due',id:d.id,name:d.name,amount:d.amount,date:d.dueDate,raw:d,over:dt<tod});});
  cards.forEach(card=>{[thisYM,nextYM].forEach(y2=>{const dates=S.cardDates[card.id+'::'+y2];if(dates?.due){const dt=new Date(dates.due+'T12:00:00'),stmt=getStmt(card.id,y2,allCharges),paid=S.stmtPays.some(sp=>sp.cardId===card.id&&sp.yearMonth===y2);if(!paid&&dt>=past&&dt<=fut&&stmt.total>0)upcoming.push({type:'card',id:'c::'+card.id+'::'+y2,name:card.name,amount:stmt.total,date:dates.due,cardId:card.id,ymStr:y2,over:dt<tod});}});});
  upcoming.sort((a,b)=>a.date.localeCompare(b.date));
  const cardTots=cards.map(c=>({name:c.name,total:getStmt(c.id,nextYM,allCharges).total,cardId:c.id})).filter(c=>c.total>0);
  const nextDues=S.dues.filter(d=>ymOf(d.dueDate)===nextYM&&d.status==='pending');
  const nextTotal=cardTots.reduce((s,c)=>s+c.total,0)+nextDues.reduce((s,d)=>s+d.amount,0);
  const moMap={};
  S.cashTxs.forEach(tx=>{const mk=ymOf(tx.payDate);if(!moMap[mk])moMap[mk]={month:mk,income:0,expense:0,txs:[]};if(tx.isIncome)moMap[mk].income+=tx.amount;else moMap[mk].expense+=tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount;moMap[mk].txs.push(tx);});
  const hist=Object.values(moMap).sort((a,b)=>b.month.localeCompare(a.month)).map(d=>({...d,income:Math.round(d.income),expense:Math.round(d.expense),net:Math.round(d.income-d.expense)}));
  const yrMap={};hist.forEach(h=>{const yr=h.month.slice(0,4);if(!yrMap[yr])yrMap[yr]={year:yr,income:0,expense:0};yrMap[yr].income+=h.income;yrMap[yr].expense+=h.expense;});
  const yrHist=Object.values(yrMap).sort((a,b)=>b.year.localeCompare(a.year)).map(d=>({...d,net:Math.round(d.income-d.expense)}));
  const years=[...new Set(hist.map(h=>h.month.slice(0,4)))].sort((a,b)=>b.localeCompare(a));
  const months=[];for(let i=-12;i<=2;i++){const d2=new Date(cy,cm+i,1);months.push(ym(d2.getFullYear(),d2.getMonth()));}
  const filtTxs=[...S.cashTxs,...S.creditExps].filter(tx=>{
    const pd=tx.payDate||tx.consumptionDate||tx.consumDate;
    const ch=tx.type==='cr'?genCharges(tx,S.cardDates):[];
    const mM=S.fMonth==='all'||(tx.type==='cr'?ch.some(c=>c.yearMonth===S.fMonth):ymOf(pd)===S.fMonth);
    return mM&&(S.fAcc==='all'||tx.accountId===S.fAcc)&&(!S.search||tx.description.toLowerCase().includes(S.search.toLowerCase()));
  }).sort((a,b)=>{const da=a.payDate||a.consumptionDate||a.consumDate,db=b.payDate||b.consumptionDate||b.consumDate;return db.localeCompare(da);});
  return{allCharges,cards,liqAccts,savAccts,nonCredit,totalLiq,committed,duesAmt,netAvail,thisInc,thisExp,debts,upcoming,cardTots,nextDues,nextTotal,hist,yrHist,years,months,filtTxs};
}

function dispatch(a,p){
  const apply=(accs,id,delta)=>accs.map(x=>x.id===id?{...x,balance:Math.round((x.balance+delta)*100)/100}:x);
  const imp=tx=>tx.isIncome?tx.amount:-(tx.deductMode==='mine'?tx.amount*tx.myPct/100:tx.amount);
  if(a==='DARK'){S.dark=!S.dark;}
  else if(a==='TAB'){S.tab=p;}
  else if(a==='MODAL'){S.modal=p;MF={};}
  else if(a==='CAL_P'){const d=new Date(S.calYr,S.calMo-1,1);S.calMo=d.getMonth();S.calYr=d.getFullYear();}
  else if(a==='CAL_N'){const d=new Date(S.calYr,S.calMo+1,1);S.calMo=d.getMonth();S.calYr=d.getFullYear();}
  else if(a==='CAL_TOG'){S.calOpen=!S.calOpen;}
  else if(a==='TOG_UP'){S.showAllUp=!S.showAllUp;}
  else if(a==='TOG_NX'){S.showNextDetail=!S.showNextDetail;}
  else if(a==='SEARCH'){S.search=p;}
  else if(a==='FMONTH'){S.fMonth=p;}
  else if(a==='FACC'){S.fAcc=p;}
  else if(a==='SELCARD'){S.selCard=p;}
  else if(a==='HVIEW'){S.histView=p;}
  else if(a==='HMONTH'){S.histMonth=p;}
  else if(a==='HYEAR'){S.histYear=p;}
  else if(a==='SAVE_CASH'){
    const d=p;
    if(d.editId){const old=S.cashTxs.find(t=>t.id===d.editId);S.accounts=apply(apply(S.accounts,old.accountId,-imp(old)),d.accountId,imp(d));S.cashTxs=S.cashTxs.map(t=>t.id===d.editId?{...d,id:d.editId}:t);}
    else{S.accounts=apply(S.accounts,d.accountId,imp(d));S.cashTxs=[...S.cashTxs,{...d,id:'tx-'+Date.now()}];}
    S.modal=null;
  }
  else if(a==='QUICK'){
    const{accId,amount,isIncome,category,description}=p;
    S.accounts=apply(S.accounts,accId,isIncome?amount:-amount);
    S.cashTxs=[...S.cashTxs,{id:'tx-'+Date.now(),type:'cf',description,amount,category,consumDate:td(),payDate:td(),accountId:accId,isIncome,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
    S.modal=null;
  }
  else if(a==='TRANSFER'){
    const{fromId,toId,amount}=p;
    S.accounts=apply(apply(S.accounts,fromId,-amount),toId,amount);
    S.modal=null;
  }
  else if(a==='SAVE_CR'){
    const d=p;
    if(d.editId)S.creditExps=S.creditExps.map(e=>e.id===d.editId?{...d,id:d.editId}:e);
    else S.creditExps=[...S.creditExps,{...d,id:'cr-'+Date.now()}];
    S.modal=null;
  }
  else if(a==='DEL_CASH'){S.accounts=apply(S.accounts,p.accountId,-imp(p));S.cashTxs=S.cashTxs.filter(t=>t.id!==p.id);}
  else if(a==='DEL_CR'){if(p.installments>1&&!confirm('¿Eliminar todas las cuotas?'))return;S.creditExps=S.creditExps.filter(e=>e.id!==p.id);}
  else if(a==='PAY_STMT'){
    const{cardId,ymStr,amount,payDate,fromId}=p;
    S.accounts=apply(S.accounts,fromId,-amount);
    S.stmtPays=[...S.stmtPays,{id:'sp-'+Date.now(),cardId,yearMonth:ymStr,amount,payDate,fromId}];
    S.modal=null;
  }
  else if(a==='PAY_DUE'){
    const{due,method,accId,cardId,inst}=p;
    if(method==='cash'){S.accounts=apply(S.accounts,accId,-due.amount);S.cashTxs=[...S.cashTxs,{id:'tx-'+Date.now(),type:'cf',description:due.name,amount:due.amount,category:'Servicios',consumDate:due.dueDate,payDate:td(),accountId:accId,isIncome:false,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];}
    else S.creditExps=[...S.creditExps,{id:'cr-'+Date.now(),type:'cr',description:due.name,amount:due.amount,category:'Servicios',consumptionDate:td(),accountId:cardId,installments:inst||1,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];
    S.dues=S.dues.map(d=>d.id===due.id?{...d,status:'paid'}:d);S.modal=null;
  }
  else if(a==='GOT_PAID'){
    const{tx,amount,method,toId}=p;
    if(method!=='other'){S.accounts=apply(S.accounts,toId,amount);S.cashTxs=[...S.cashTxs,{id:'pay-'+Date.now(),type:'cf',description:'Cobro: '+tx.description,amount,category:'Otros ingresos',consumDate:td(),payDate:td(),accountId:toId,isIncome:true,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false}];}
    if(tx.type==='cf')S.cashTxs=S.cashTxs.map(t=>t.id===tx.id?{...t,debtPaid:true}:t);
    else S.creditExps=S.creditExps.map(e=>e.id===tx.id?{...e,debtPaid:true}:e);
    S.modal=null;
  }
  else if(a==='CDATES'){const{cardId,ymStr,closing,due}=p;S.cardDates={...S.cardDates,[cardId+'::'+ymStr]:{closing,due}};S.modal=null;}
  else if(a==='ADD_ACC'){S.accounts=[...S.accounts,{...p,id:'a-'+Date.now(),balance:parseFloat(p.balance||0)}];S.modal=null;}
  else if(a==='SAVE_DUE'){S.dues=[...S.dues,{...p,id:'d-'+Date.now(),status:'pending'}];S.modal=null;}
  else if(a==='DEL_ACC'){
    const acc=S.accounts.find(x=>x.id===p);if(!acc)return;
    const refs=S.cashTxs.filter(t=>t.accountId===p).length+S.creditExps.filter(e=>e.accountId===p).length;
    if(!confirm(refs>0?`"${acc.name}" tiene ${refs} movimientos. ¿Eliminar todo?`:`¿Eliminar "${acc.name}"?`))return;
    S.accounts=S.accounts.filter(x=>x.id!==p);
    S.cashTxs=S.cashTxs.filter(t=>t.accountId!==p);
    S.creditExps=S.creditExps.filter(e=>e.accountId!==p);
    S.stmtPays=S.stmtPays.filter(sp=>sp.fromId!==p&&sp.cardId!==p);
    if(acc.type==='credit')Object.keys(S.cardDates).forEach(k=>{if(k.startsWith(p+'::'))delete S.cardDates[k];});
  }
  else if(a==='EXPORT'){doExport();}
  else if(a==='IMPORT'){doImport(p);}
  render();
}

function doExport(){
  const bom='\uFEFF';
  const csv=rows=>rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const dl=(data,name)=>{
    const uri='data:text/csv;charset=utf-8,'+encodeURIComponent(bom+data);
    const a=document.createElement('a');a.href=uri;a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };
  const r1=[['ID','Fecha consumo','Fecha pago','Descripción','Tipo','Categoría','Monto','Mi%','Compartido con','Cuenta','Cuotas','Cuota#']];
  S.cashTxs.forEach(tx=>{const acc=S.accounts.find(a=>a.id===tx.accountId);r1.push([tx.id,tx.consumDate||'',tx.payDate||'',tx.description,tx.isIncome?'Ingreso':'Gasto',tx.category,tx.amount,tx.myPct,tx.sharedWith||'',acc?.name||'',1,1]);});
  S.creditExps.forEach(exp=>{const acc=S.accounts.find(a=>a.id===exp.accountId);genCharges(exp,S.cardDates).forEach(c=>r1.push([exp.id,exp.consumptionDate||'','',exp.description,'Tarjeta',exp.category,c.amount,exp.myPct,exp.sharedWith||'',acc?.name||'',exp.installments,c.idx]));});
  dl(csv(r1),'movimientos-'+thisYM+'.csv');
  const r2=[['ID','Nombre','Tipo','Saldo']];S.accounts.forEach(a=>r2.push([a.id,a.name,a.type,a.balance]));
  setTimeout(()=>dl(csv(r2),'cuentas-'+thisYM+'.csv'),400);
  alert('✅ Exportado!\n• movimientos-'+thisYM+'.csv\n• cuentas-'+thisYM+'.csv');
}
function doImport(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('Archivo vacío');return;}
      const parseRow=line=>{const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'&&!inQ)inQ=true;else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'&&inQ)inQ=false;else if(c===','&&!inQ){cols.push(cur);cur='';}else cur+=c;}cols.push(cur);return cols.map(c=>c.trim());};
      const hdr=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,''));
      const rows=lines.slice(1).map(l=>parseRow(l));
      const get=(row,name)=>{const i=hdr.findIndex(h=>h.includes(name));return i>=0?row[i]||'':''};
      let imp=0,skip=0;const newT=[],newC=[];
      rows.forEach((row,i)=>{
        const id=get(row,'id')||('imp-'+Date.now()+'-'+i);
        const tipo=get(row,'tipo').toLowerCase();
        const desc=get(row,'descripci');const monto=parseFloat(get(row,'monto'))||0;
        const cat=get(row,'categor');const cdate=get(row,'consumo')||get(row,'fecha')||td();const pdate=get(row,'pago')||cdate;
        const accName=get(row,'cuenta');const acc=S.accounts.find(a=>a.name===accName)||S.accounts[0];
        if(!desc||!monto)return;
        if(tipo==='tarjeta'){if(!newC.find(x=>x.id===id)){const inst=parseInt(get(row,'cuotas'))||1;newC.push({id,type:'cr',description:desc,amount:monto*inst,category:cat||CATS[0],consumptionDate:cdate,accountId:acc?.id||S.accounts[0].id,installments:inst,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false});imp++;}}
        else{if(!S.cashTxs.find(t=>t.id===id)){const isIn=tipo==='ingreso';newT.push({id,type:'cf',description:desc,amount:monto,category:cat||(isIn?ICATS[0]:CATS[0]),consumDate:cdate,payDate:pdate,accountId:acc?.id||S.accounts[0].id,isIncome:isIn,shared:false,myPct:100,deductMode:'mine',sharedWith:'',debtPaid:false});imp++;}else skip++;}
      });
      if(confirm(imp+' movimientos nuevos'+(skip?' ('+skip+' duplicados)':'')+'.\n¿Agregar?')){
        const apply=(accs,id,delta)=>accs.map(x=>x.id===id?{...x,balance:Math.round((x.balance+delta)*100)/100}:x);
        newT.forEach(tx=>{S.accounts=apply(S.accounts,tx.accountId,tx.isIncome?tx.amount:-tx.amount);S.cashTxs.push(tx);});
        newC.forEach(exp=>S.creditExps.push(exp));
        alert(imp+' movimientos importados.');render();
      }
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsText(file,'utf-8');
}

function pie(data){
  if(!data.length)return'';
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=0;
  const paths=data.map((d,i)=>{
    const a=d.value/total*2*Math.PI,x1=Math.cos(angle-Math.PI/2)*72+90,y1=Math.sin(angle-Math.PI/2)*72+90;
    angle+=a;const x2=Math.cos(angle-Math.PI/2)*72+90,y2=Math.sin(angle-Math.PI/2)*72+90;
    return`<path d="M90,90 L${x1},${y1} A72,72 0 ${d.value/total>.5?1:0},1 ${x2},${y2} Z" fill="${CC[i%CC.length]}" stroke="${BG()}" stroke-width="2"/>`;
  });
  const legend=data.slice(0,6).map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="width:11px;height:11px;border-radius:4px;background:${CC[i%CC.length]};flex-shrink:0"></div><span style="font-size:12px;color:${M()};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.name)}</span><span style="font-size:12px;font-weight:600">${fmt(d.value)}</span></div>`).join('');
  return`<span class="lbl">Gastos por categoría</span><div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px"><svg width="180" height="180" viewBox="0 0 180 180">${paths.join('')}<circle cx="90" cy="90" r="40" fill="${BG()}"/><text x="90" y="87" text-anchor="middle" font-size="11" fill="${M()}" font-family="Inter,sans-serif">Total</text><text x="90" y="102" text-anchor="middle" font-size="13" fill="${TX()}" font-weight="600" font-family="Inter,sans-serif">${fmt(total)}</text></svg><div style="flex:1;min-width:120px">${legend}</div></div>`;
}

function bars(data,ltype){
  if(!data.length)return`<p style="text-align:center;color:${M()};padding:18px 0">Sin datos</p>`;
  const maxV=Math.max(...data.flatMap(d=>[d.income,d.expense]),1);
  const H=110,bw=13,gap=4,pl=14,step=bw*2+gap+10,W=Math.max(280,pl+data.length*step+20);
  const bs=data.map((d,i)=>{
    const x=pl+i*step,ih=d.income/maxV*(H-22),eh=d.expense/maxV*(H-22);
    const lbl=ltype==='año'?d.year:MSH[parseInt(d.month.slice(5,7))-1];
    return`<rect x="${x}" y="${H-ih}" width="${bw}" height="${Math.max(ih,2)}" fill="var(--green)" rx="3" opacity=".85"/><rect x="${x+bw+2}" y="${H-eh}" width="${bw}" height="${Math.max(eh,2)}" fill="var(--red)" rx="3" opacity=".85"/><text x="${x+bw}" y="${H+13}" text-anchor="middle" font-size="9" fill="${M()}" font-family="Inter,sans-serif">${lbl}</text>`;
  });
  return`<div style="overflow-x:auto;padding:4px 0"><svg width="${W}" height="${H+18}" viewBox="0 0 ${W} ${H+18}"><rect x="0" y="0" width="${W}" height="${H}" rx="6" fill="${IN()}" opacity=".4"/><text x="8" y="14" font-size="9" fill="var(--green)" font-family="Inter,sans-serif" font-weight="600">■ Ingresos</text><text x="72" y="14" font-size="9" fill="var(--red)" font-family="Inter,sans-serif" font-weight="600">■ Gastos</text>${bs.join('')}</svg></div>`;
}

  const mh=t=>`<div class="mhandle"></div><div class="mhead"><span>${t}</span><button id="bCls">×</button></div>`;
  const mi=(id,lbl,type,val,ph)=>`<div><label class="flbl">${lbl}</label><input id="${id}" type="${type||'text'}" value="${esc(String(val||''))}" placeholder="${ph||''}" class="inp"></div>`;
  const ms=(id,lbl,opts,sel)=>`<div><label class="flbl">${lbl}</label><select id="${id}" style="background:${IN()};border:1px solid ${BD()};border-radius:12px;padding:11px 14px;font-size:14px;color:${TX()};font-family:inherit;width:100%;outline:none">${opts.map(([v,l])=>`<option value="${v}"${sel===v?' selected':''}>${l}</option>`).join('')}</select></div>`;
  const seg=(id,opts,act)=>`<div class="seg">${opts.map(([v,l,col])=>`<button class="sbtn" data-seg="${id}" data-val="${v}" style="border-color:${act===v?col:BD()};background:${act===v?col+'18':'transparent'};color:${act===v?col:M()};font-weight:${act===v?'600':'500'}">${l}</button>`).join('')}</div>`;
  const mbtns=`<div style="display:flex;gap:10px;padding-bottom:4px"><button id="bCancel" class="btn-s">Cancelar</button><button id="bSave" class="btn-p">Guardar</button></div>`;
  let body='';

  if(m.type==='quick'){
    const acc=S.accounts.find(a=>a.id===m.accId);
    const isIn=MF.isIncome!=null?MF.isIncome:m.isIncome;
    const isY=isIn==='yield',isTr=isIn==='transfer';
    const cats=isY?['Rendimientos']:(isIn?ICATS:CATS);
    const autoCat=isY?'Rendimientos':(MF.category||(isIn?ICATS[0]:CATS[0]));
    const otherAccts=S.accounts.filter(a=>a.id!==m.accId&&a.type!=='credit');
    const isCredit=acc?.type==='credit';
    // Credit cards can't do transfers, only expense entries
    const qtOpts=isCredit
      ? [[false,'🔴 Egreso','var(--red)']]
      : [[true,'💚 Ingreso','var(--green)'],[false,'🔴 Egreso','var(--red)'],['yield','📈 Rendimiento','var(--amber)'],['transfer','🔄 Transferencia','var(--teal)']];
    const activeQt=isCredit?false:(isY?'yield':isTr?'transfer':isIn?true:false);
    body=mh((isTr?'🔄 Transferencia':isY?'📈 Rendimiento':isIn?'💚 Ingreso':'🔴 Egreso')+' · '+esc(acc?.name||''))+`<div class="mbody">
      ${seg('qt',qtOpts,activeQt)}
      ${mi('mAmt','Monto','number')}
      ${isTr?ms('mToAcc','Cuenta destino',otherAccts.map(a=>[a.id,(AICO[a.type]||'💰')+' '+a.name]),MF.mToAcc||otherAccts[0]?.id||''):
        `${mi('mDesc','Descripción','text','',isY?'Ej: Rendimiento mensual':isIn?'Ej: Sueldo':'Ej: Supermercado')}
         ${ms('mCat','Categoría',cats.map(c=>[c,c]),autoCat)}`}
      ${mbtns}
    </div>`;
  }
  else if(m.type==='tx'){
    const pf=m.prefill||{};
    const mode=MF.payMode||(pf.type==='cr'?'credit':'cash');
    const isIn=MF.isIncome!=null?MF.isIncome:(pf.isIncome!=null?pf.isIncome:false);
    const cardAccs=S.accounts.filter(a=>a.type==='credit');
    const cashAccs=S.accounts.filter(a=>a.type!=='credit');
    const selA=MF.accountId||(mode==='credit'?(pf.accountId||cardAccs[0]?.id||''):(pf.accountId||cashAccs[0]?.id||''));
    const inst=MF.installments!=null?MF.installments:(pf.installments||1);
    const cdate=MF.consumptionDate||(pf.consumptionDate||pf.consumDate||td());
    const cym=ymOf(cdate);
    const hasDates=mode==='credit'?!!S.cardDates[selA+'::'+cym]:true;
    const f1=mode==='credit'&&selA?firstYM(cdate,selA,S.cardDates):'—';
    const shared=MF.shared!=null?MF.shared:(pf.shared||false);
    const myPct=MF.myPct!=null?MF.myPct:(pf.myPct||50);
    const cats=isIn?ICATS:CATS;
    body=mh(m.editId?'✏️ Editar movimiento':'➕ Nuevo movimiento')+`<div class="mbody">
      ${!m.editId?seg('payMode',[['cash','💵 Efectivo/Débito','var(--green)'],['credit','💳 Tarjeta','var(--amber)']],mode):''}
      ${mode==='cash'?seg('isIncome',[[false,'🔴 Gasto','var(--red)'],[true,'💚 Ingreso','var(--green)']],isIn):''}
      ${mi('mDesc','Descripción','text',pf.description||'')}
      <div style="display:flex;gap:10px">
        ${mi('mAmt','Monto','number',MF.amount||pf.amount||'')}
        ${ms('mCat','Categoría',cats.map(c=>[c,c]),MF.category||pf.category||cats[0])}
      </div>
      ${mode==='cash'?`<div style="display:flex;gap:10px">${mi('mCdate','Fecha consumo','date',MF.consumptionDate||pf.consumDate||pf.consumptionDate||td())}${mi('mPdate','Fecha pago','date',MF.paymentDate||pf.payDate||td())}</div>`:mi('mCdate','Fecha consumo','date',cdate)}
      ${mode==='credit'?ms('mAcc','Tarjeta',cardAccs.map(a=>[a.id,a.name]),selA):ms('mAcc','Cuenta',cashAccs.map(a=>[a.id,a.name]),selA)}
      ${mode==='credit'&&!hasDates?`<div class="ibox" style="border:1px solid rgba(196,122,26,.3);color:var(--amber)">⚠️ Sin cierre cargado para ${cym} — <button class="sm" data-a="cdates" data-cid="${selA}" data-ym="${cym}" style="background:var(--amber);margin-top:6px">Cargar</button></div>`:''}
      ${mode==='credit'?`<div><label class="flbl">Cuotas</label>${seg('inst',[[1,'1 cuota','var(--accent)'],[0,'Varias','var(--accent)']],inst===1?1:0)}${inst>1?`<div style="display:flex;align-items:center;gap:10px;margin-top:10px"><label class="flbl" style="margin:0;white-space:nowrap">¿Cuántas?</label><input id="mInst" type="number" min="2" max="60" value="${inst}" style="background:${IN()};border:1px solid ${BD()};border-radius:10px;padding:9px 12px;font-size:14px;color:${TX()};font-family:inherit;width:80px;outline:none"></div>`:''}${hasDates&&selA?`<div style="padding:8px 12px;background:${IN()};border-radius:10px;font-size:12px;color:${M()};margin-top:10px">Cuota 1 → <strong style="color:var(--accent)">${f1}</strong>${inst>1?' · hasta <strong style="color:var(--accent)">'+addMo(f1,inst-1)+'</strong>':''}</div>`:''}</div>`:''}
      ${!isIn?`<div style="display:flex;justify-content:space-between;align-items:center"><label class="flbl" style="margin:0">Gasto compartido</label><button class="tog" id="togS" style="background:${shared?'var(--accent)':BD()}"><div class="tok" style="left:${shared?22:3}px"></div></button></div>
      ${shared?`<div class="sbox"><label class="flbl">Mi parte</label><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><input id="mPct" type="range" min="1" max="99" value="${myPct}"><span id="pctL" style="font-weight:700;color:var(--accent);min-width:36px;text-align:right">${myPct}%</span></div>${mi('mSW','Con quién','text',MF.sharedWith||pf.sharedWith||'','Nombre...')}</div>`:''}`:''}
      ${mbtns}
    </div>`;
  }
  else if(m.type==='newDue'){
    const rec=MF.recurring||false;
    body=mh('📅 Nuevo vencimiento')+`<div class="mbody">
      ${mi('mName','Nombre')}${mi('mAmt','Monto','number')}${mi('mDate','Fecha','date',td())}
      <div style="display:flex;justify-content:space-between;align-items:center"><label class="flbl" style="margin:0">Se repite mensualmente</label><button class="tog" id="togR" style="background:${rec?'var(--accent)':BD()}"><div class="tok" style="left:${rec?22:3}px"></div></button></div>
      ${mbtns}
    </div>`;
  }
  else if(m.type==='payDue'){
    const method=MF.method||'cash';
    body=mh('Pagar: '+esc(m.due.name))+`<div class="mbody">
      <div style="background:${ABG()};border-radius:16px;padding:16px;text-align:center;border:1px solid rgba(193,127,58,.2)">
        <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:400;color:var(--accent)">${fmt(m.due.amount)}</div>
        ${m.due.over?`<div style="font-size:11px;color:var(--red);margin-top:3px;font-weight:600">⚠️ Vencido el ${m.due.dueDate}</div>`:`<div style="font-size:11px;color:${M()};margin-top:3px">${m.due.dueDate}</div>`}
      </div>
      ${seg('method',[['cash','💵 Efectivo/Débito','var(--accent)'],['credit','💳 Tarjeta','var(--accent)']],method)}
      ${method==='cash'?ms('mAcc','Desde',C.nonCredit.map(a=>[a.id,a.name]),MF.accId||C.nonCredit[0]?.id||''):''}
      ${method==='credit'?`${ms('mCard','Tarjeta',C.cards.map(c=>[c.id,c.name]),MF.cardId||C.cards[0]?.id||'')}${mi('mInst','Cuotas','number',MF.inst||1)}`:''}
      ${mbtns}
    </div>`;
  }
  else if(m.type==='payStmt'){
    const stmt=getStmt(m.cardId,m.ymStr,C.allCharges);
    body=mh('💳 Pagar resumen')+`<div class="mbody">
      <div style="background:${ABG()};border-radius:16px;padding:16px;text-align:center;border:1px solid rgba(193,127,58,.2)">
        <div style="font-size:11px;color:${M()};margin-bottom:4px">${m.ymStr} · ${stmt.charges.length} consumos</div>
        <div style="font-family:'Playfair Display',serif;font-size:36px;font-weight:400;color:var(--accent)">${fmt(stmt.total)}</div>
      </div>
      ${mi('mAmt','Monto a pagar','number',MF.amount||stmt.total)}
      ${mi('mDate','Fecha de pago','date',MF.payDate||td())}
      ${ms('mAcc','Debitá de',C.nonCredit.map(a=>[a.id,a.name]),MF.fromId||C.nonCredit[0]?.id||'')}
      ${mbtns}
    </div>`;
  }
  else if(m.type==='gotPaid'){
    const method=MF.method||'cash';const their=Math.round(m.tx.amount*(1-m.tx.myPct/100));
    body=mh('✓ Me pagaron')+`<div class="mbody">
      <div style="background:rgba(61,154,106,.1);border-radius:16px;padding:14px;border:1px solid rgba(61,154,106,.2)">
        <div style="font-size:12px;color:${M()}">${esc(m.tx.description)} · ${esc(m.tx.sharedWith||'')} te debe</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:var(--green);margin-top:3px">${fmt(their)}</div>
      </div>
      ${mi('mAmt','Monto recibido','number',MF.amount||their)}
      ${seg('method',[['cash','💵 Efectivo','var(--accent)'],['transfer','🏦 Transferencia','var(--accent)'],['other','Otro','var(--muted)']],method)}
      ${method!=='other'?ms('mAcc','Acreditá en',C.nonCredit.map(a=>[a.id,a.name]),MF.toId||C.nonCredit[0]?.id||''):''}
      ${mbtns}
    </div>`;
  }
  else if(m.type==='cdates'){
    const card=S.accounts.find(a=>a.id===m.cardId);
    const [y,mo]=m.ymStr.split('-').map(Number);const ex=S.cardDates[m.cardId+'::'+m.ymStr];
    body=mh('📅 Fechas · '+esc(card?.name||'')+' '+m.ymStr)+`<div class="mbody">
      <div class="ibox">📅 <strong>Cierre:</strong> gastos hasta esta fecha entran en el resumen de ${m.ymStr}.<br><br>💳 <strong>Vencimiento:</strong> cuando el pago sale de tu saldo.</div>
      ${mi('mClosing','Fecha de cierre','date',MF.closing||ex?.closing||new Date(y,mo,0).toISOString().slice(0,10))}
      ${mi('mDue','Fecha de vencimiento','date',MF.due||ex?.due||new Date(y,mo,10).toISOString().slice(0,10))}
      ${mbtns}
    </div>`;
  }
  else if(m.type==='addAcc'){
    const type=MF.accType||'debit';const opt=ATYPES.find(o=>o.v===type);
    body=mh('➕ Agregar cuenta')+`<div class="mbody">
      <div><label class="flbl">Tipo</label><div class="seg">${ATYPES.map(o=>`<button class="sbtn" data-seg="accType" data-val="${o.v}" style="border-color:${type===o.v?'var(--accent)':BD()};background:${type===o.v?ABG():'transparent'};color:${type===o.v?'var(--accent)':M()};font-size:11px">${o.l}</button>`).join('')}</div>${opt?`<div style="font-size:11px;color:${M()};margin-top:8px;padding:8px 11px;background:${IN()};border-radius:10px">${opt.liq?'✅ Suma al saldo disponible':'📦 Aparece en Ahorros e inversiones'}</div>`:''}</div>
      ${mi('mName','Nombre','text','','Ej: Fondo IOL')}
      ${type!=='credit'?mi('mBal','Saldo inicial','number',0):''}
      ${mbtns}
    </div>`;
  }
  return`<div class="modal-bg" id="mBg"><div class="mbox">${body}</div></div>`;
}

// ── WIRE ─────────────────────────────────────────────────────────
function wire(C){
  const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn);};
  const onC=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('change',fn);};
  const onI=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',fn);};
  const all=(sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener('click',fn));
  on('bDark',()=>dispatch('DARK'));
  on('bExp',()=>dispatch('EXPORT'));
  const fi=document.getElementById('fImp');if(fi)fi.addEventListener('change',e=>{if(e.target.files[0])dispatch('IMPORT',e.target.files[0]);e.target.value='';});
  all('.tab',function(){dispatch('TAB',parseInt(this.dataset.t));});
  on('calP',()=>dispatch('CAL_P'));on('calN',()=>dispatch('CAL_N'));
  on('bCalTog',()=>dispatch('CAL_TOG'));
  on('bTogUp',()=>dispatch('TOG_UP'));on('bTogNx',()=>dispatch('TOG_NX'));
  on('bAddAcc',()=>dispatch('MODAL',{type:'addAcc'}));
  on('bNewTx',()=>dispatch('MODAL',{type:'tx'}));
  on('bDue',()=>dispatch('MODAL',{type:'newDue'}));
  onI('inpS',e=>dispatch('SEARCH',e.target.value));
  onC('selMo',e=>dispatch('FMONTH',e.target.value));onC('selAcc',e=>dispatch('FACC',e.target.value));
  onC('selHM',e=>dispatch('HMONTH',e.target.value));onC('selHY',e=>dispatch('HYEAR',e.target.value));
  all('[data-a]',function(){
    const a=this.dataset.a;
    if(a==='pay-stmt')dispatch('MODAL',{type:'payStmt',cardId:this.dataset.cid,ymStr:this.dataset.ym});
    else if(a==='pay-due'){const due=S.dues.find(d=>d.id===this.dataset.did);if(due)dispatch('MODAL',{type:'payDue',due});}
    else if(a==='got-paid'){const tx=[...S.cashTxs,...S.creditExps].find(t=>t.id===this.dataset.tid);if(tx)dispatch('MODAL',{type:'gotPaid',tx});}
    else if(a==='edit-tx'){const tx=[...S.cashTxs,...S.creditExps].find(t=>t.id===this.dataset.tid);if(tx)dispatch('MODAL',{type:'tx',editId:tx.id,prefill:tx});}
    else if(a==='del-tx'){const tp=this.dataset.tt;if(tp==='cf'){const tx=S.cashTxs.find(t=>t.id===this.dataset.tid);if(tx&&confirm('¿Eliminar?'))dispatch('DEL_CASH',tx);}else{const exp=S.creditExps.find(e=>e.id===this.dataset.tid);if(exp)dispatch('DEL_CR',exp);}}
    else if(a==='cdates')dispatch('MODAL',{type:'cdates',cardId:this.dataset.cid,ymStr:this.dataset.ym});
    else if(a==='selcard')dispatch('SELCARD',this.dataset.cid);
    else if(a==='qplus')dispatch('MODAL',{type:'quick',accId:this.dataset.aid,isIncome:true});
    else if(a==='qminus')dispatch('MODAL',{type:'quick',accId:this.dataset.aid,isIncome:false});
    else if(a==='del-acc')dispatch('DEL_ACC',this.dataset.aid);
    else if(a==='hview')dispatch('HVIEW',this.dataset.val);
  });
  on('mBg',function(e){if(e.target.id==='mBg')dispatch('MODAL',null);});
  on('bCls',()=>dispatch('MODAL',null));on('bCancel',()=>dispatch('MODAL',null));
  all('[data-seg]',function(){
    const seg=this.dataset.seg,val=this.dataset.val;
    const p=val==='true'?true:val==='false'?false:isNaN(val)?val:Number(val);
    if(seg==='payMode'){MF.payMode=val;syncMF();render();}
    else if(seg==='isIncome'){MF.isIncome=p;syncMF();render();}
    else if(seg==='accType'){MF.accType=val;syncMF();render();}
    else if(seg==='method'){MF.method=val;syncMF();render();}
    else if(seg==='inst'){MF.installments=p===0?(MF.installments>1?MF.installments:3):1;syncMF();render();}
    else if(seg==='qt'){MF.isIncome=val==='yield'?'yield':val==='transfer'?'transfer':p;MF.category=undefined;syncMF();render();}
  });
  on('togS',()=>{MF.shared=!(MF.shared!=null?MF.shared:(S.modal?.prefill?.shared||false));syncMF();render();});
  on('togR',()=>{MF.recurring=!MF.recurring;syncMF();render();});
  onI('mPct',function(){document.getElementById('pctL').textContent=this.value+'%';MF.myPct=parseInt(this.value);});
  on('bSave',()=>save(C));
}
function syncMF(){
  ['mDesc','mAmt','mCat','mCdate','mPdate','mAcc','mCard','mInst','mSW','mName','mDate','mBal','mClosing','mDue','mToAcc'].forEach(id=>{const el=document.getElementById(id);if(el)MF[id]=el.type==='number'?parseFloat(el.value)||0:el.value;});
}
const gv=(id,def)=>{const el=document.getElementById(id);return el?el.value:(def||'');};
const gn=(id,def)=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:(def||0);};
function save(C){
  const m=S.modal;
  if(m.type==='quick'){
    const amount=gn('mAmt');if(!amount)return;
    const isIn=MF.isIncome!=null?MF.isIncome:m.isIncome;
    const isY=isIn==='yield',isTr=isIn==='transfer';
    if(isTr){const toId=gv('mToAcc');if(!toId)return;dispatch('TRANSFER',{fromId:m.accId,toId,amount});}
    else dispatch('QUICK',{accId:m.accId,amount,isIncome:isY?true:!!isIn,category:isY?'Rendimientos':gv('mCat'),description:gv('mDesc')||'Movimiento'});
  }
  else if(m.type==='tx'){
    const mode=MF.payMode||(m.prefill?.type==='cr'?'credit':'cash');
    const desc=gv('mDesc'),amount=gn('mAmt'),cat=gv('mCat');
    if(!desc||!amount)return;
    if(mode==='credit'){
      const cid=gv('mAcc'),cd=gv('mCdate',td());
      if(!S.cardDates[cid+'::'+ymOf(cd)]){dispatch('MODAL',{type:'cdates',cardId:cid,ymStr:ymOf(cd)});return;}
      const instEl=document.getElementById('mInst');
      const inst=instEl?parseInt(instEl.value)||1:(MF.installments||m.prefill?.installments||1);
      const shared=MF.shared!=null?MF.shared:(m.prefill?.shared||false);
      const myPct=shared?(parseInt(document.getElementById('mPct')?.value)||50):100;
      dispatch('SAVE_CR',{type:'cr',description:desc,amount,category:cat,consumptionDate:cd,accountId:cid,installments:inst,shared,myPct,deductMode:'mine',sharedWith:gv('mSW'),debtPaid:false,editId:m.editId});
    } else {
      const isIn=MF.isIncome!=null?MF.isIncome:!!(m.prefill?.isIncome);
      const shared=MF.shared!=null?MF.shared:(m.prefill?.shared||false);
      const myPct=shared?(parseInt(document.getElementById('mPct')?.value)||50):100;
      dispatch('SAVE_CASH',{type:'cf',description:desc,amount,category:cat,consumDate:gv('mCdate',td()),payDate:gv('mPdate',td()),accountId:gv('mAcc'),isIncome:isIn,shared,myPct,deductMode:'mine',sharedWith:gv('mSW'),debtPaid:false,editId:m.editId});
    }
  }
  else if(m.type==='newDue'){const name=gv('mName'),amount=gn('mAmt'),dueDate=gv('mDate',td());if(!name||!amount)return;dispatch('SAVE_DUE',{name,amount,dueDate,recurring:MF.recurring||false});}
  else if(m.type==='payDue')dispatch('PAY_DUE',{due:m.due,method:MF.method||'cash',accId:gv('mAcc'),cardId:gv('mCard'),inst:gn('mInst',1)});
  else if(m.type==='payStmt')dispatch('PAY_STMT',{cardId:m.cardId,ymStr:m.ymStr,amount:gn('mAmt'),payDate:gv('mDate',td()),fromId:gv('mAcc')});
  else if(m.type==='gotPaid')dispatch('GOT_PAID',{tx:m.tx,amount:gn('mAmt'),method:MF.method||'cash',toId:gv('mAcc')});
  else if(m.type==='cdates'){const cl=gv('mClosing'),due=gv('mDue');if(!cl||!due)return;dispatch('CDATES',{cardId:m.cardId,ymStr:m.ymStr,closing:cl,due});}
  else if(m.type==='addAcc'){const name=gv('mName');if(!name)return;dispatch('ADD_ACC',{name,type:MF.accType||'debit',balance:gn('mBal')});}
}
render();
</script>
</body>
</html>
