<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cuentas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f4ee;color:#2d2520;min-height:100vh}
.dk body,.dk{background:#1a1714;color:#f5f0eb}
.card{background:#fff;border:1px solid #e8e0d5;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(184,115,42,.08)}
.dk .card{background:#242120;border-color:#3d3835}
.btn-p{background:#b8732a;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.btn-s{background:transparent;border:1.5px solid #e8e0d5;color:#8b7d74;border-radius:12px;padding:12px 20px;font-size:15px;cursor:pointer;font-family:inherit;width:100%;font-weight:600}
.dk .btn-s{border-color:#3d3835;color:#9e948e}
.sm{background:#b8732a;color:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8b7d74;margin-bottom:8px;display:block}
.flbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8b7d74;display:block;margin-bottom:6px}
.dk .lbl,.dk .flbl{color:#9e948e}
.modal-bg{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5)}
.mbox{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:94vh;overflow-y:auto;padding-bottom:32px}
.dk .mbox{background:#242120}
.mhandle{width:40px;height:5px;background:#e8e0d5;border-radius:9999px;margin:14px auto 4px}
.dk .mhandle{background:#3d3835}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:16px 24px 12px;border-bottom:1px solid #e8e0d5}
.dk .mhead{border-color:#3d3835}
.mbody{padding:16px 24px 0;display:flex;flex-direction:column;gap:16px}
.tab-bar{display:flex;border-bottom:1px solid #e8e0d5;padding:0 14px;overflow-x:auto}
.dk .tab-bar{border-color:#3d3835}
.tab{padding:12px 18px;font-size:14px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;color:#8b7d74;margin-bottom:-1px}
.tab.on{color:#b8732a;border-bottom-color:#b8732a;font-weight:700}
.header{background:rgba(248,244,238,.95);backdrop-filter:blur(16px);border-bottom:1px solid #e8e0d5;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.dk .header{background:rgba(26,23,20,.95);border-color:#3d3835}
.seg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.sbtn{padding:12px 14px;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e8e0d5;background:transparent;color:#8b7d74;font-family:inherit;text-align:center;transition:all .2s}
.dk .sbtn{border-color:#3d3835;color:#9e948e}
.arow{display:flex;align-items:center;padding:12px 16px;background:#f0ebe3;border-radius:14px;margin-bottom:8px;gap:12px}
.dk .arow{background:#302d2b}
.qbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid #e8e0d5;background:transparent;color:#8b7d74;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.dk .qbtn{border-color:#3d3835;color:#9e948e}
.qbtn:hover{transform:scale(1.15);background:#f0ebe3}
.sdiv{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#b8732a;margin:18px 0 10px;padding-left:4px}
main{max-width:640px;margin:0 auto;padding:16px 16px 110px}
.fab-wrap{position:fixed;bottom:24px;right:20px;display:flex;flex-direction:column;gap:12px;align-items:flex-end;z-index:50}
.fab{background:#b8732a;color:#fff;border:none;border-radius:50%;width:60px;height:60px;font-size:28px;cursor:pointer;box-shadow:0 6px 24px rgba(184,115,42,.4);display:flex;align-items:center;justify-content:center}
.fab-sm{background:#fff;border:1.5px solid #e8e0d5;color:#8b7d74;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dk .fab-sm{background:#242120;border-color:#3d3835}
</style>
</head>
<body id="B"><div id="R"></div>
<script>
// ── UTILS ─────────────────────────────────────────────────────────
const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
const td=()=>new Date().toISOString().slice(0,10);
const ym=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const ymOf=s=>s?s.slice(0,7):'';
const addMo=(s,n)=>{const y=parseInt(s.slice(0,4)),m=parseInt(s.slice(5,7))-1,d=new Date(y,m+n,1);return ym(d.getFullYear(),d.getMonth());};
const thisYM=ym(cy,cm),nextYM=addMo(thisYM,1);
const fmt=n=>'$'+Number(n||0).toLocaleString('es-AR',{maximumFractionDigits:0});
const D=(day,mo,yr)=>new Date(yr||cy,mo!=null?mo:cm,day).toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

const CATS=['Alimentación','Transporte','Servicios','Entretenimiento','Salud','Ropa','Educación','Viajes','Hogar','Otros'];
const ICATS=['Sueldo','Honorarios','Rendimientos','Dividendos','Alquiler cobrado','Transferencia recibida','Otros ingresos'];
const MOS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ATYPES=[
  {v:'cash',l:'💵 Efectivo',liq:true},
  {v:'debit',l:'🏦 Débito / CA',liq:true},
  {v:'savliq',l:'💰 Cta. remunerada',liq:true},
  {v:'invliq',l:'📈 Fondo común',liq:true},
  {v:'sav',l:'🎯 Ahorro',liq:false},
  {v:'inv',l:'📊 Inversión',liq:false},
  {v:'credit',l:'💳 Tarjeta de crédito',liq:false},
];
const AICO={cash:'💵',debit:'🏦',savliq:'💰',invliq:'📈',sav:'🎯',inv:'📊',credit:'💳'};
const isLiq=t=>['cash','debit','savliq','invliq'].includes(t);
const isSav=t=>['sav','inv','savliq','invliq'].includes(t);

// ── STATE ─────────────────────────────────────────────────────────
let S={ dark:false, tab:0,
  accounts:[
    {id:'a1',name:'Efectivo',type:'cash',balance:15000},
    {id:'a2',name:'Galicia CA',type:'debit',balance:82500},
    {id:'a3',name:'Brubank',type:'debit',balance:43200},
    {id:'a4',name:'Visa Galicia',type:'credit',balance:0},
    {id:'a5',name:'Mastercard',type:'credit',balance:0},
    {id:'a6',name:'Fondo IOL',type:'invliq',balance:120000},
    {id:'a7',name:'Reserva vacaciones',type:'sav',balance:50000},
    {id:'a8',name:'Fondo ahorro',type:'inv',balance:80000},
  ],
  cashTxs:[], creditExps:[], dues:[], cardDates:{}, stmtPays:[],
  modal:null, calMo:cm, calYr:cy,
  search:'', fMonth:thisYM, fAcc:'all',
  showAllUp:false, showNextDetail:false, selCard:'a4',
  histView:'mes', histMonth:thisYM, histYear:String(cy),
};
let MF={};

// ── COMPUTED (simplificado para que arranque rápido) ─────────────
function comp(){
  const liqAccts=S.accounts.filter(a=>isLiq(a.type));
  const savAccts=S.accounts.filter(a=>isSav(a.type));
  return {liqAccts, savAccts, totalLiq: liqAccts.reduce((s,a)=>s+a.balance,0)};
}

// ── DISPATCH ──────────────────────────────────────────────────────
function dispatch(a,p){
  if(a==='DARK') S.dark=!S.dark;
  else if(a==='TAB') S.tab=p;
  else if(a==='MODAL'){ S.modal=p; MF={}; }
  else if(a==='ADD_ACC'){
    S.accounts=[...S.accounts,{...p,id:'a-'+Date.now(),balance:parseFloat(p.balance||0)}];
    S.modal=null;
  }
  else if(a==='DEL_ACC'){
    if(confirm(`¿Eliminar cuenta "${S.accounts.find(x=>x.id===p).name}"?`)){
      S.accounts=S.accounts.filter(x=>x.id!==p);
    }
  }
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const C=comp();
  document.getElementById('B').className=S.dark?'dk':'';
  document.getElementById('R').innerHTML=html(C);
  wire();
}

function html(C){
  return `
<div class="header">
  <span style="font-family:Georgia,serif;font-size:21px;font-weight:400;color:#b8732a">⟨ Cuentas ⟩</span>
  <button class="hbtn" id="bDark">${S.dark?'☀️':'🌙'}</button>
</div>
<div class="tab-bar">
  <button class="tab${S.tab===0?' on':''}" data-t="0">Inicio</button>
</div>
<main>
  ${S.tab===0?tabHome(C):''}
</main>
<div class="fab-wrap">
  <button class="fab" id="bNewTx">+</button>
</div>
${S.modal?modal(C):''}`;
}

function tabHome(C){
  return `
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-size:15px;font-weight:700">Saldo Disponible</span>
    <span style="font-size:24px;font-weight:700;color:#5c9e6e">${fmt(C.totalLiq)}</span>
  </div>
  <div class="sdiv">Cuentas disponibles</div>
  ${C.liqAccts.map(a=>aRow(a)).join('')}
  <button id="bAddAccLiq" style="background:transparent;border:1.5px dashed #e8e0d5;border-radius:12px;padding:14px;color:#8b7d74;cursor:pointer;font-size:14px;width:100%;margin-top:12px">+ Agregar cuenta</button>
</div>

<div class="card">
  <div class="sdiv">Ahorro</div>
  ${C.savAccts.map(a=>aRow(a)).join('')}
  <button id="bAddAccSav" style="background:transparent;border:1.5px dashed #e8e0d5;border-radius:12px;padding:14px;color:#8b7d74;cursor:pointer;font-size:14px;width:100%;margin-top:12px">+ Agregar cuenta de ahorro</button>
</div>`;
}

function aRow(acc){
  return `<div class="arow">
    <span style="flex:1;font-size:14px">${AICO[acc.type]||'💰'} ${esc(acc.name)}</span>
    <span style="font-size:15px;font-weight:700;color:#5c9e6e;margin-right:12px">${fmt(acc.balance)}</span>
    <button class="qbtn" data-a="del-acc" data-aid="${acc.id}">🗑</button>
  </div>`;
}

function modal(C){
  const m=S.modal;
  if(m.type==='addAcc'){
    const type=MF.accType||'debit';
    return `<div class="modal-bg" id="mBg"><div class="mbox">
      <div class="mhandle"></div>
      <div class="mhead"><span style="font-size:17px;font-weight:700">Nueva cuenta</span><button id="bCls">×</button></div>
      <div class="mbody">
        <div><label class="flbl">Tipo de cuenta</label>
          <div class="seg">
            ${ATYPES.map(o=>`
              <button class="sbtn" data-seg="accType" data-val="${o.v}" style="border-color:${type===o.v?'#b8732a':'#e8e0d5'};background:${type===o.v?'#fef3e2':'transparent'};color:${type===o.v?'#b8732a':'#8b7d74'}">
                ${o.l}
              </button>`).join('')}
          </div>
        </div>
        <input id="mName" placeholder="Nombre de la cuenta" style="padding:14px;border-radius:12px;border:1px solid #e8e0d5;width:100%;font-size:15px">
        <input id="mBal" type="number" placeholder="Saldo inicial" style="padding:14px;border-radius:12px;border:1px solid #e8e0d5;width:100%;font-size:15px">
        <button id="bSave" class="btn-p">Guardar cuenta</button>
      </div>
    </div></div>`;
  }
  return '';
}

function wire(){
  document.getElementById('bDark').onclick = () => dispatch('DARK');
  document.getElementById('bAddAccLiq').onclick = () => dispatch('MODAL',{type:'addAcc'});
  document.getElementById('bAddAccSav').onclick = () => dispatch('MODAL',{type:'addAcc'});
  document.getElementById('bNewTx').onclick = () => alert("Nuevo movimiento (próximamente)");

  document.querySelectorAll('[data-a="del-acc"]').forEach(btn=>{
    btn.onclick = () => dispatch('DEL_ACC', btn.dataset.aid);
  });

  const mBg = document.getElementById('mBg');
  if(mBg) mBg.onclick = e => { if(e.target.id==='mBg') dispatch('MODAL',null); };

  document.getElementById('bCls') && (document.getElementById('bCls').onclick = () => dispatch('MODAL',null));
  document.getElementById('bSave') && (document.getElementById('bSave').onclick = () => {
    const name = document.getElementById('mName').value.trim();
    if(name) dispatch('ADD_ACC', {name, type: MF.accType||'debit', balance: parseFloat(document.getElementById('mBal').value)||0 });
  });

  document.querySelectorAll('[data-seg="accType"]').forEach(b=>{
    b.onclick = () => { MF.accType = b.dataset.val; render(); };
  });
}

render();
</script>
</body>
</html>
